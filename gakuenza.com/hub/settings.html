<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設定 — がくえん座</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="hub-shell.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  .settings-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-5); max-width: 420px; }
  .settings-card label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #444; }
  .settings-card input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 14px; background: #fdfcf9; }
  .settings-card button { width: auto; padding: 10px 20px; border: none; border-radius: 8px; background: var(--moss); color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; }
  .settings-card button:hover { background: var(--moss-deep); }
  .settings-msg { font-size: 13px; border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; display: none; }
  .settings-msg.ok { display: block; background: #eef2ea; color: var(--moss-deep); }
  .settings-msg.err { display: block; background: #fdecea; color: var(--error); }
</style>
</head>
<body>

<div class="page-frame">
  <aside class="sidebar" id="sidebar-mount"></aside>

  <main class="main">
    <div class="hub-section">
      <h1 class="greeting-title">設定</h1>
      <p class="greeting-date">パスワードの変更</p>
    </div>

    <div class="settings-card">
      <div class="settings-msg" id="msg"></div>
      <form id="password-form">
        <label>新しいパスワード</label>
        <input type="password" id="new-password" autocomplete="new-password" required minlength="8">
        <label>新しいパスワード（確認）</label>
        <input type="password" id="confirm-password" autocomplete="new-password" required minlength="8">
        <button type="submit">パスワードを更新</button>
      </form>
    </div>
  </main>
</div>

<script src="supabase.js"></script>
<script src="config.js"></script>
<script src="hub-common.js"></script>
<script>
(async function () {
  const H = window.HubCommon;
  const cfg = window.GAKUENZA_CONFIG;
  const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

  const session = await H.requireSession(sb);
  if (!session) return;
  await H.renderSidebar(sb, session.user.id, 'settings');

  const msg = document.getElementById('msg');
  function showMsg(text, ok) {
    msg.textContent = text;
    msg.className = 'settings-msg ' + (ok ? 'ok' : 'err');
  }

  document.getElementById('password-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const p1 = document.getElementById('new-password').value;
    const p2 = document.getElementById('confirm-password').value;

    if (p1 !== p2) { showMsg('パスワードが一致しません。', false); return; }
    if (p1.length < 8) { showMsg('パスワードは8文字以上にしてください。', false); return; }

    const { error } = await sb.auth.updateUser({ password: p1 });
    document.getElementById('new-password').value = '';
    document.getElementById('confirm-password').value = '';

    if (error) showMsg('更新に失敗しました：' + error.message, false);
    else showMsg('パスワードを更新しました。', true);
  });
})();
</script>
</body>
</html>
