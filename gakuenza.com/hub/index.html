<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホーム — がくえん座</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="hub-shell.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="page-frame">
  <aside class="sidebar" id="sidebar-mount"></aside>

  <main class="main">
    <div class="hub-section">
      <h1 class="greeting-title" id="greeting">…</h1>
      <p class="greeting-date" id="greeting-date"></p>
    </div>

    <div class="hub-section">
      <div class="section-header"><h2 class="section-title">最近アクセスしたモジュール</h2></div>
      <div class="recent-list" id="recent-list"></div>
    </div>

    <div>
      <div class="section-header"><h2 class="section-title">割り当てられたモジュール</h2></div>
      <div id="assigned-groups"></div>
    </div>
  </main>
</div>

<script src="supabase.js"></script>
<script src="config.js"></script>
<script src="hub-common.js"></script>
<script>
(async function () {
  const H = window.HubCommon;
  const cfg = window.GAKUENZA_CONFIG;
  const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

  const session = await H.requireSession(sb);
  if (!session) return;
  const userId = session.user.id;

  const { given } = await H.renderSidebar(sb, userId, 'home');
  document.getElementById('greeting').textContent = given ? `${given}さん、おかえりなさい` : 'おかえりなさい';
  document.getElementById('greeting-date').textContent = H.formatGreetingDate(new Date());

  // ── assigned modules (via this student's class(es)) ──────────────────
  const { data: enrollmentRows } = await sb
    .from('enrollments').select('class_id').eq('user_id', userId).eq('role', 'student');
  const classIds = (enrollmentRows || []).map(r => r.class_id);

  let assigned = [];
  let assignedErr = null;
  if (classIds.length) {
    const res = await sb
      .from('class_modules')
      .select('class_id, due_date, total_items, modules(id, key, name, name_en, subject, launch_url)')
      .in('class_id', classIds);
    assigned = res.data || [];
    assignedErr = res.error;
  }
  const seen = new Set();
  assigned = assigned.filter(a => {
    if (!a.modules || seen.has(a.modules.id)) return false;
    seen.add(a.modules.id);
    return true;
  });

  // ── this student's activity, for completion + recency ─────────────────
  const { data: activity, error: activityErr } = await sb
    .from('activity_results').select('module_id, activity_ref, created_at').eq('user_id', userId);

  const attemptedByModule = {}, lastAccessByModule = {};
  for (const a of (activity || [])) {
    (attemptedByModule[a.module_id] ||= new Set()).add(a.activity_ref);
    const t = new Date(a.created_at).getTime();
    if (!lastAccessByModule[a.module_id] || t > lastAccessByModule[a.module_id]) lastAccessByModule[a.module_id] = t;
  }
  const totalItemsByModule = {};
  for (const a of assigned) if (a.total_items != null) totalItemsByModule[a.modules.id] = a.total_items;

  function computeStatus(moduleId) {
    const attempted = attemptedByModule[moduleId]?.size || 0;
    const total = totalItemsByModule[moduleId] ?? null;
    const pct = total ? Math.min(100, Math.round((attempted / total) * 100)) : null;
    let status = 'not_started';
    if (pct !== null && pct >= 100) status = 'done';
    else if (attempted > 0) status = 'progress';
    return { attempted, pct, status };
  }

  // ── render: recently accessed (top 3 by last access) ──────────────────
  const recentList = document.getElementById('recent-list');
  if (activityErr) {
    recentList.innerHTML = '<p class="calm-msg">読み込めませんでした</p>';
  } else {
    const moduleIdsWithActivity = Object.keys(lastAccessByModule);
    if (moduleIdsWithActivity.length === 0) {
      recentList.innerHTML = '<p class="calm-msg">まだアクセスした記録がありません。</p>';
    } else {
      const { data: recentModules } = await sb
        .from('modules').select('id, name, name_en, subject, launch_url').in('id', moduleIdsWithActivity);
      const modInfo = Object.fromEntries((recentModules || []).map(m => [m.id, m]));
      const top3 = moduleIdsWithActivity
        .sort((a, b) => lastAccessByModule[b] - lastAccessByModule[a])
        .slice(0, 3);
      recentList.innerHTML = top3.map(mid => {
        const m = modInfo[mid];
        if (!m) return '';
        const { pct } = computeStatus(mid);
        return `
          <div class="hub-card" data-module-key="${m.key || ''}" data-launch-url="${m.launch_url || ''}">
            <div class="recent-row">
              <span class="subject-dot" style="background:${H.subjectVar(m.subject)};"></span>
              <div style="flex:1; min-width:0;">
                <div><span class="recent-title">${m.name}</span> ${m.name_en ? `<span class="recent-title-en">${m.name_en}</span>` : ''}</div>
                <div class="recent-meta">${H.relativeTime(new Date(lastAccessByModule[mid]).toISOString())}</div>
              </div>
              <div class="recent-progress">
                ${H.progressBar(pct)}
                ${pct !== null ? `<div class="progress-pct">${pct}%</div>` : ''}
              </div>
            </div>
          </div>`;
      }).join('');
    }
  }

  // ── render: assigned modules grouped by subject ────────────────────────
  const groupsEl = document.getElementById('assigned-groups');
  if (assignedErr) {
    groupsEl.innerHTML = '<p class="calm-msg">読み込めませんでした</p>';
  } else if (assigned.length === 0) {
    groupsEl.innerHTML = '<p class="calm-msg">割り当てられたモジュールはまだありません。</p>';
  } else {
    const bySubject = {};
    for (const a of assigned) (bySubject[a.modules.subject] ||= []).push(a);
    // Within each subject, order by due date (soonest first); undated last.
    // due_date is 'YYYY-MM-DD', so a lexicographic compare sorts correctly.
    const dueRank = (a) => a.due_date || '9999-99-99';
    for (const subj in bySubject) bySubject[subj].sort((x, y) => dueRank(x).localeCompare(dueRank(y)));

    groupsEl.innerHTML = H.sortedSubjectKeys(bySubject).map(subject => [subject, bySubject[subject]]).map(([subject, mods]) => `
      <div class="subject-group">
        <div class="subject-label">
          <span class="subject-dot" style="background:${H.subjectVar(subject)};"></span>
          <span class="name">${H.subjectLabel(subject)}</span>
        </div>
        <div class="subject-grid">
          ${mods.map(a => {
            const m = a.modules;
            const { pct, status, attempted } = computeStatus(m.id);
            const lastAccess = lastAccessByModule[m.id];
            let metaParts = [];
            if (a.due_date) metaParts.push(H.formatDueDate(a.due_date));
            else if (lastAccess) metaParts.push(H.relativeTime(new Date(lastAccess).toISOString()));
            else metaParts.push('未着手');
            let badge = '';
            if (status === 'done') badge = '<span class="hub-pill-badge badge-done">完了</span>';
            else if (status === 'progress') badge = '<span class="hub-pill-badge badge-progress">進行中</span>';
            return `
              <div class="hub-card" data-module-key="${m.key || ''}" data-launch-url="${m.launch_url || ''}">
                <div class="module-title">${m.name}</div>
                <div class="module-meta">${metaParts.join(' ')} ${badge}</div>
                ${H.progressBar(pct !== null ? pct : (attempted > 0 ? null : 0))}
              </div>`;
          }).join('')}
        </div>
      </div>`).join('');
  }

  document.querySelectorAll('[data-module-key]').forEach(el => {
    const url = el.dataset.launchUrl;
    el.addEventListener('click', () => {
      if (url) window.location.href = url;
      else alert('このモジュールは近日公開予定です。');
    });
  });
})();
</script>
</body>
</html>
