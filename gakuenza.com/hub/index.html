<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホーム — がくえん座</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="hub-shell.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* Kadaiban worksheet cards on the hub home (surfaced alongside modules). */
  .kbh-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .kbh-card { background:var(--paper); border:1px solid var(--mist); border-radius:10px; overflow:hidden; cursor:pointer; transition:transform 140ms ease, box-shadow 140ms ease; }
  .kbh-card:hover { transform:translateY(-2px); box-shadow:0 4px 14px rgba(28,37,48,.1); }
  @media (prefers-reduced-motion: reduce) { .kbh-card { transition:none; } .kbh-card:hover { transform:none; } }
  .kbh-thumb { height:120px; background:var(--paper-dim); border-bottom:1px solid var(--mist); display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
  .kbh-thumb img { width:100%; height:100%; object-fit:cover; object-position:top center; opacity:.96; }
  .kbh-pill { position:absolute; top:8px; left:8px; font-size:10.5px; font-weight:700; padding:3px 10px; border-radius:999px; }
  .kbh-body { padding:14px 16px 16px; }
  .kbh-cat { font-size:11.5px; font-weight:600; color:var(--ink-soft); display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .kbh-dot { width:10px; height:10px; border-radius:50%; background:var(--moss); }
  .kbh-title { font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:15px; color:var(--ink); margin-bottom:6px; }
  .kbh-foot { display:flex; align-items:center; justify-content:space-between; }
  .kbh-due { font-size:11.5px; color:var(--clay); font-weight:700; white-space:nowrap; }
  .kbh-cta { background:var(--moss); color:#fff; border-radius:999px; padding:6px 14px; font-size:12px; font-weight:700; }
</style>
</head>
<body>

<div class="page-frame">
  <aside class="sidebar" id="sidebar-mount"></aside>

  <main class="main">
    <div class="hub-section">
      <h1 class="greeting-title" id="greeting">…</h1>
      <p class="greeting-date" id="greeting-date"></p>
    </div>

    <div class="hub-section" id="assignments-section" style="display:none;">
      <div class="section-header"><h2 class="section-title">課題</h2></div>
      <div id="assignments-list"></div>
    </div>

    <div class="hub-section" id="kadaiban-section" style="display:none;">
      <div class="section-header"><h2 class="section-title">手書きプリント</h2></div>
      <div id="kadaiban-list"></div>
    </div>

    <div class="hub-section" id="recent-section">
      <div class="section-header"><h2 class="section-title">最近アクセスしたモジュール</h2></div>
      <div class="recent-list" id="recent-list"></div>
    </div>

    <div>
      <div class="section-header"><h2 class="section-title" id="assigned-title">割り当てられたモジュール</h2></div>
      <div id="assigned-groups"></div>
    </div>
  </main>
</div>

<script src="supabase.js"></script>
<script src="config.js"></script>
<script src="hub-common.js"></script>
<script>
(async function () {
  const H = window.HubCommon;
  const cfg = window.GAKUENZA_CONFIG;
  const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

  const session = await H.requireSession(sb);
  if (!session) return;
  const userId = session.user.id;

  const { given } = await H.renderSidebar(sb, userId, 'home');
  document.getElementById('greeting').textContent = given ? `${given}さん、おかえりなさい` : 'おかえりなさい';
  document.getElementById('greeting-date').textContent = H.formatGreetingDate(new Date());

  // ── modules to show on the home ──────────────────────────────────────
  // A student sees the modules assigned to their class(es). Staff
  // (educators / admins / coordinators) have no student enrollment, so
  // instead show the modules their school has ENABLED — a catalog they can
  // open to preview/try. Teachers assign & monitor in 成績; this is just
  // "what's available to use". A launch by staff records nothing (the
  // module report shims skip when there's no student class context).
  const { data: enrollmentRows } = await sb
    .from('enrollments').select('class_id').eq('user_id', userId).eq('role', 'student');
  const classIds = (enrollmentRows || []).map(r => r.class_id);

  let assigned = [];
  let assignedErr = null;
  let staffMode = false;
  if (classIds.length) {
    const res = await sb
      .from('class_modules')
      .select('class_id, due_date, total_items, modules(id, key, name, name_en, subject, launch_url)')
      .in('class_id', classIds);
    assigned = res.data || [];
    assignedErr = res.error;
  } else {
    const { data: memberRow } = await sb
      .from('school_members').select('school_id')
      .eq('user_id', userId).in('role', ['educator', 'school_admin', 'coordinator'])
      .limit(1).maybeSingle();
    if (memberRow) {
      staffMode = true;
      const res = await sb
        .from('school_modules')
        .select('modules(id, key, name, name_en, subject, launch_url, is_active)')
        .eq('school_id', memberRow.school_id).eq('enabled', true);
      assignedErr = res.error;
      assigned = (res.data || [])
        .filter(r => r.modules && r.modules.is_active)
        .map(r => ({ due_date: null, total_items: null, modules: r.modules }));
    }
  }
  const seen = new Set();
  assigned = assigned.filter(a => {
    if (!a.modules || seen.has(a.modules.id)) return false;
    seen.add(a.modules.id);
    return true;
  });

  // Staff home: no personal "recently accessed" history, and the section
  // below is a catalog of what's available, not personal assignments.
  if (staffMode) {
    document.getElementById('recent-section').style.display = 'none';
    document.getElementById('assigned-title').textContent = '利用可能なモジュール';
  }

  // ── this student's activity, for completion + recency ─────────────────
  const { data: activity, error: activityErr } = await sb
    .from('activity_results').select('module_id, activity_ref, created_at').eq('user_id', userId);

  const attemptedByModule = {}, lastAccessByModule = {};
  for (const a of (activity || [])) {
    (attemptedByModule[a.module_id] ||= new Set()).add(a.activity_ref);
    const t = new Date(a.created_at).getTime();
    if (!lastAccessByModule[a.module_id] || t > lastAccessByModule[a.module_id]) lastAccessByModule[a.module_id] = t;
  }
  const totalItemsByModule = {};
  for (const a of assigned) if (a.total_items != null) totalItemsByModule[a.modules.id] = a.total_items;

  function computeStatus(moduleId) {
    const attempted = attemptedByModule[moduleId]?.size || 0;
    const total = totalItemsByModule[moduleId] ?? null;
    const pct = total ? Math.min(100, Math.round((attempted / total) * 100)) : null;
    let status = 'not_started';
    if (pct !== null && pct >= 100) status = 'done';
    else if (attempted > 0) status = 'progress';
    return { attempted, pct, status };
  }

  // ── render: recently accessed (top 3 by last access) ──────────────────
  const recentList = document.getElementById('recent-list');
  if (activityErr) {
    recentList.innerHTML = '<p class="calm-msg">読み込めませんでした</p>';
  } else {
    const moduleIdsWithActivity = Object.keys(lastAccessByModule);
    if (moduleIdsWithActivity.length === 0) {
      recentList.innerHTML = '<p class="calm-msg">まだアクセスした記録がありません。</p>';
    } else {
      const { data: recentModules } = await sb
        .from('modules').select('id, name, name_en, subject, launch_url').in('id', moduleIdsWithActivity);
      const modInfo = Object.fromEntries((recentModules || []).map(m => [m.id, m]));
      const top3 = moduleIdsWithActivity
        .sort((a, b) => lastAccessByModule[b] - lastAccessByModule[a])
        .slice(0, 3);
      recentList.innerHTML = top3.map(mid => {
        const m = modInfo[mid];
        if (!m) return '';
        const { pct } = computeStatus(mid);
        return `
          <div class="hub-card" data-module-key="${m.key || ''}" data-launch-url="${m.launch_url || ''}">
            <div class="recent-row">
              <span class="subject-dot" style="background:${H.subjectVar(m.subject)};"></span>
              <div style="flex:1; min-width:0;">
                <div><span class="recent-title">${m.name}</span> ${m.name_en ? `<span class="recent-title-en">${m.name_en}</span>` : ''}</div>
                <div class="recent-meta">${H.relativeTime(new Date(lastAccessByModule[mid]).toISOString())}</div>
              </div>
              <div class="recent-progress">
                ${H.progressBar(pct)}
                ${pct !== null ? `<div class="progress-pct">${pct}%</div>` : ''}
              </div>
            </div>
          </div>`;
      }).join('');
    }
  }

  // ── render: assigned modules grouped by subject ────────────────────────
  const groupsEl = document.getElementById('assigned-groups');
  if (assignedErr) {
    groupsEl.innerHTML = '<p class="calm-msg">読み込めませんでした</p>';
  } else if (assigned.length === 0) {
    groupsEl.innerHTML = `<p class="calm-msg">${staffMode ? '利用可能なモジュールがありません。' : '割り当てられたモジュールはまだありません。'}</p>`;
  } else {
    const bySubject = {};
    for (const a of assigned) (bySubject[a.modules.subject] ||= []).push(a);
    // Within each subject, order by due date (soonest first); undated last.
    // due_date is 'YYYY-MM-DD', so a lexicographic compare sorts correctly.
    const dueRank = (a) => a.due_date || '9999-99-99';
    for (const subj in bySubject) bySubject[subj].sort((x, y) => dueRank(x).localeCompare(dueRank(y)));

    groupsEl.innerHTML = H.sortedSubjectKeys(bySubject).map(subject => [subject, bySubject[subject]]).map(([subject, mods]) => `
      <div class="subject-group">
        <div class="subject-label">
          <span class="subject-dot" style="background:${H.subjectVar(subject)};"></span>
          <span class="name">${H.subjectLabel(subject)}</span>
        </div>
        <div class="subject-grid">
          ${mods.map(a => {
            const m = a.modules;
            const { pct, status, attempted } = computeStatus(m.id);
            const lastAccess = lastAccessByModule[m.id];
            let metaParts = [];
            if (a.due_date) metaParts.push(H.formatDueDate(a.due_date));
            else if (lastAccess) metaParts.push(H.relativeTime(new Date(lastAccess).toISOString()));
            else metaParts.push('未着手');
            let badge = '';
            if (status === 'done') badge = '<span class="hub-pill-badge badge-done">完了</span>';
            else if (status === 'progress') badge = '<span class="hub-pill-badge badge-progress">進行中</span>';
            return `
              <div class="hub-card" data-module-key="${m.key || ''}" data-launch-url="${m.launch_url || ''}">
                <div class="module-title">${m.name}</div>
                <div class="module-meta">${metaParts.join(' ')} ${badge}</div>
                ${H.progressBar(pct !== null ? pct : (attempted > 0 ? null : 0))}
              </div>`;
          }).join('')}
        </div>
      </div>`).join('');
  }

  document.querySelectorAll('[data-module-key]').forEach(el => {
    const url = el.dataset.launchUrl;
    el.addEventListener('click', () => {
      if (url) window.location.href = url;
      else alert('このモジュールは近日公開予定です。');
    });
  });

  // ── 課題 (module assignments — discrete teacher-issued tasks, #176) ─────
  // Distinct from the "割り当てられたモジュール" catalog below: these are the
  // specific tasks a teacher handed out (module + optional units + due date).
  // Students only — staff author them in the gradebook. "Done" is inferred:
  // an activity_results row for the module dated on/after the assignment.
  if (classIds.length) {
    try {
      const { data: mAsgs, error: mErr } = await sb.from('module_assignments')
        .select('id, class_id, module_id, due_date, focus_units, target_items, created_at, modules(id, key, name, subject, launch_url)')
        .in('class_id', classIds)
        .order('due_date', { ascending: true, nullsFirst: false });
      if (!mErr && mAsgs && mAsgs.length) {
        const isDone = (a) => (activity || []).some(r => r.module_id === a.module_id && r.created_at >= a.created_at);
        const fmtDue = (d) => { if (!d) return '期限なし'; const x = new Date(d + 'T00:00:00'); return `${x.getMonth() + 1}月${x.getDate()}日まで`; };
        document.getElementById('assignments-list').innerHTML = `<div class="kbh-grid">${mAsgs.map(a => {
          const m = a.modules || {};
          const st = isDone(a)
            ? { label: '完了',   color: 'var(--moss-deep)', bg: 'var(--moss-tint)' }
            : { label: 'これから', color: 'var(--clay)',      bg: 'rgba(181,87,46,.12)' };
          return `<div class="kbh-card" data-launch-url="${m.launch_url || ''}">
            <div class="kbh-body">
              <div class="kbh-cat"><span class="kbh-dot" style="background:${H.subjectVar(m.subject)};"></span>課題</div>
              <div class="kbh-title">${H.escapeHtml(m.name || 'モジュール')}</div>
              <div class="kbh-foot"><span class="kbh-due">${H.escapeHtml(fmtDue(a.due_date))}</span><span class="kbh-cta" style="background:${st.bg};color:${st.color};">${st.label}</span></div>
            </div>
          </div>`;
        }).join('')}</div>`;
        document.getElementById('assignments-section').style.display = '';
        document.querySelectorAll('#assignments-list .kbh-card').forEach(c => c.addEventListener('click', () => {
          const url = c.dataset.launchUrl;
          if (url) window.location.href = url; else alert('このモジュールは近日公開予定です。');
        }));
      }
    } catch (e) { console.error('[hub] module assignments surfacing failed', e); }
  }

  // ── Kadaiban (手書きプリント) — surfaced alongside modules for students ────
  // Its own tables/buckets live behind RLS; a signed URL renders the thumbnail.
  // §8: Phase 2 will merge these into one due-date-aware list with modules; for
  // now they get their own prominent section (student classes only).
  if (classIds.length) {
    try {
      const { data: kAsgs } = await sb.from('kadaiban_assignments')
        .select('id, title, instructions, due_date, class_id')
        .in('class_id', classIds).order('due_date', { ascending: true, nullsFirst: false });
      if (kAsgs && kAsgs.length) {
        const ids = kAsgs.map(a => a.id);
        const [{ data: kPages }, { data: kSubs }] = await Promise.all([
          sb.from('kadaiban_assignment_pages').select('assignment_id, source_image_path').in('assignment_id', ids).eq('page_number', 1),
          sb.from('kadaiban_submissions').select('assignment_id, status').eq('student_id', userId).in('assignment_id', ids),
        ]);
        const pathBy = {}; (kPages || []).forEach(p => { pathBy[p.assignment_id] = p.source_image_path; });
        const statusBy = {}; (kSubs || []).forEach(s => { statusBy[s.assignment_id] = s.status; });
        const paths = ids.map(id => pathBy[id]).filter(Boolean);
        const urlBy = {};
        if (paths.length) {
          const { data: signed } = await sb.storage.from('kadaiban-sources').createSignedUrls(paths, 3600);
          (signed || []).forEach(s => { if (s.path && s.signedUrl) urlBy[s.path] = s.signedUrl; });
        }
        const KST = {
          not_started: { label: '未着手',   color: '#8a8f98',        bg: '#efe9db' },
          in_progress: { label: '下書き中', color: '#8a6d1f',        bg: 'rgba(201,162,75,.16)' },
          submitted:   { label: '提出ずみ', color: 'var(--clay)',     bg: 'rgba(181,87,46,.12)' },
          graded:      { label: '採点ずみ', color: 'var(--moss-deep)', bg: 'var(--moss-tint)' },
        };
        const WK = ['日','月','火','水','木','金','土'];
        const fmtDue = (d) => { if (!d) return '期限なし'; const x = new Date(d + 'T00:00:00'); return `${x.getMonth() + 1}月${x.getDate()}日まで`; };
        const cta = (s) => (s === 'submitted' || s === 'graded') ? '提出ずみ（見る）' : s === 'in_progress' ? 'つづきを書く' : 'はじめる';
        document.getElementById('kadaiban-list').innerHTML = `<div class="kbh-grid">${kAsgs.map(a => {
          const st = statusBy[a.id] || 'not_started'; const m = KST[st]; const url = pathBy[a.id] ? urlBy[pathBy[a.id]] : null;
          return `<div class="kbh-card" data-a="${a.id}">
            <div class="kbh-thumb">${url ? `<img src="${H.escapeHtml(url)}" alt="プリント">` : ''}<span class="kbh-pill" style="background:${m.bg};color:${m.color};">${m.label}</span></div>
            <div class="kbh-body">
              <div class="kbh-cat"><span class="kbh-dot"></span>手書きプリント</div>
              <div class="kbh-title">${H.escapeHtml(a.title)}</div>
              <div class="kbh-foot"><span class="kbh-due">${H.escapeHtml(fmtDue(a.due_date))}</span><span class="kbh-cta">${cta(st)}</span></div>
            </div>
          </div>`;
        }).join('')}</div>`;
        document.getElementById('kadaiban-section').style.display = '';
        document.querySelectorAll('.kbh-card').forEach(c => c.addEventListener('click', () => { window.location.href = 'kadaiban.html?a=' + encodeURIComponent(c.dataset.a); }));
      }
    } catch (e) { console.error('[hub] kadaiban surfacing failed', e); }
  }
})();
</script>
</body>
</html>
