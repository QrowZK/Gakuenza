<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学校 — がくえん座 管理</title>
<link rel="stylesheet" href="../hub-shell.css">
<link rel="stylesheet" href="admin.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="page-frame" id="app-root">
  <aside class="sidebar" id="sidebar-mount"></aside>

  <main class="main">
    <div class="ac-page-head">
      <h1 class="ac-page-title">学校</h1>
      <button class="ac-btn ac-btn-accent ac-btn-sm" type="button" id="btn-add-school">+ 学校を追加</button>
    </div>

    <!-- Full-width single-column list: school rows carry a long name plus
         code / counts / status, which do not fit the narrow ac-grid person
         cards. -->
    <div id="school-list" style="display:flex;flex-direction:column;gap:12px;max-width:760px;">
      <div class="ac-card ac-skel" style="height:64px;"></div>
      <div class="ac-card ac-skel" style="height:64px;"></div>
      <div class="ac-card ac-skel" style="height:64px;"></div>
    </div>
  </main>
</div>

<!-- ============================================================ -->
<!-- Create-school modal (platform admin only — RLS is the real boundary) -->
<!-- ============================================================ -->
<div class="ac-modal-backdrop" id="modal-add-school" style="display:none;">
  <div class="ac-modal" style="width:400px;">
    <h2 class="ac-modal-title">学校を追加</h2>
    <form id="form-add-school">
      <div class="ac-field">
        <label class="ac-field-label" for="input-school-name">学校名</label>
        <input id="input-school-name" required maxlength="100" autocomplete="off" placeholder="例：羽咋市立瑞穂小学校">
      </div>
      <div class="ac-field">
        <label class="ac-field-label" for="input-school-kana">ふりがな（任意）</label>
        <input id="input-school-kana" maxlength="120" autocomplete="off" placeholder="例：はくいしりつみずほしょうがっこう">
      </div>
      <div class="ac-field" style="margin-bottom:20px;">
        <label class="ac-field-label" for="input-school-code">コード（任意・重複不可）</label>
        <input id="input-school-code" maxlength="60" autocomplete="off" placeholder="例：mizuho">
      </div>
      <p class="ac-modal-err" id="add-school-err" style="display:none;"></p>
      <div class="ac-modal-actions">
        <button class="ac-btn ac-btn-ghost-light ac-btn-md" type="button" id="btn-cancel-add-school">キャンセル</button>
        <button class="ac-btn ac-btn-accent ac-btn-md" type="submit" id="btn-submit-add-school">作成する</button>
      </div>
    </form>
  </div>
</div>

<script src="../supabase.js"></script>
<script src="../config.js"></script>
<script src="../hub-common.js"></script>
<script src="admin-common.js"></script>
<script>
(async function () {
  const H = window.HubCommon;
  const AC = window.AdminCommon;
  const cfg = window.GAKUENZA_CONFIG;
  const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

  const session = await H.requireSession(sb);
  if (!session) return;
  const userId = session.user.id;

  const admin = await AC.requireAdminAccess(sb, userId);
  if (!admin) return;

  const { data: profile } = await sb.from('profiles').select('display_name').eq('id', userId).maybeSingle();
  AC.renderAdminSidebar(sb, profile, 'schools', admin);

  // Managing schools is a platform-admin-only, cross-school operation.
  // requireAdminAccess admits school_admin/coordinator too, so gate here —
  // RLS is the real boundary (creating a school needs app_is_platform_admin()),
  // this just avoids showing a scoped admin a page they can't act on.
  if (!admin.isPlatformAdmin) {
    document.getElementById('app-root').querySelector('.main').innerHTML = `
      <div class="ac-empty" style="max-width:440px;margin:80px auto;">
        <p>学校の管理は全校管理者のみが利用できます。</p>
        <a class="ac-btn ac-btn-ghost-light ac-btn-md ac-empty-cta" href="../index.html">ホームに戻る</a>
      </div>`;
    return;
  }

  const STATUS_LABEL = { active: '稼働中', suspended: '停止中', pending: '準備中' };
  const listEl = document.getElementById('school-list');

  async function loadSchools() {
    listEl.innerHTML = `
      <div class="ac-card ac-skel" style="height:64px;"></div>
      <div class="ac-card ac-skel" style="height:64px;"></div>`;

    const [schoolsRes, classesRes, enrollRes] = await Promise.all([
      sb.from('schools').select('id, name, name_kana, code, status').order('name'),
      sb.from('classes').select('id, school_id'),
      sb.from('enrollments').select('class_id').eq('role', 'student'),
    ]);

    if (schoolsRes.error) {
      listEl.innerHTML = '<p class="ac-calm-msg">読み込めませんでした</p>';
      return;
    }
    const schools = schoolsRes.data || [];
    if (!schools.length) {
      listEl.innerHTML = '<p class="ac-calm-msg">まだ学校が登録されていません。</p>';
      return;
    }

    // per-school class + student counts (client-side rollup)
    const classToSchool = {}, classCount = {}, studentCount = {};
    (classesRes.data || []).forEach(c => {
      classToSchool[c.id] = c.school_id;
      classCount[c.school_id] = (classCount[c.school_id] || 0) + 1;
    });
    (enrollRes.data || []).forEach(e => {
      const s = classToSchool[e.class_id];
      if (s) studentCount[s] = (studentCount[s] || 0) + 1;
    });

    listEl.innerHTML = schools.map(s => {
      const kana = s.name_kana ? `<div class="ac-roster-number">${H.escapeHtml(s.name_kana)}</div>` : '';
      const statusLabel = STATUS_LABEL[s.status] || s.status || '—';
      const statusClass = s.status === 'active' ? 'ac-badge-moss' : 'ac-badge-gold';
      const cls = classCount[s.id] || 0;
      const stu = studentCount[s.id] || 0;
      return `
        <div class="ac-card" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
          <div style="flex:1 1 200px;min-width:0;">
            <div class="ac-roster-name">${H.escapeHtml(s.name)}</div>
            ${kana}
          </div>
          <div style="font-size:0.76rem;color:var(--ink-soft);white-space:nowrap;">${cls}クラス・${stu}名</div>
          <div style="font-family:ui-monospace,Menlo,monospace;font-size:0.74rem;color:var(--ink-soft);white-space:nowrap;">${H.escapeHtml(s.code || '—')}</div>
          <span class="ac-badge ${statusClass}">${H.escapeHtml(statusLabel)}</span>
        </div>`;
    }).join('');
  }

  // ── create school ───────────────────────────────────────────────────
  const modal = document.getElementById('modal-add-school');
  document.getElementById('btn-add-school').addEventListener('click', () => {
    document.getElementById('form-add-school').reset();
    document.getElementById('add-school-err').style.display = 'none';
    modal.style.display = 'flex';
    document.getElementById('input-school-name').focus();
  });
  document.getElementById('btn-cancel-add-school').addEventListener('click', () => {
    modal.style.display = 'none';
  });
  document.getElementById('form-add-school').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('input-school-name').value.trim();
    const kana = document.getElementById('input-school-kana').value.trim();
    const code = document.getElementById('input-school-code').value.trim();
    const errEl = document.getElementById('add-school-err');
    const submitBtn = document.getElementById('btn-submit-add-school');
    errEl.style.display = 'none';

    const payload = { name };
    if (kana) payload.name_kana = kana;
    if (code) payload.code = code;

    submitBtn.disabled = true;
    submitBtn.textContent = '作成中…';
    const { error } = await sb.from('schools').insert(payload).select('id').single();
    submitBtn.disabled = false;
    submitBtn.textContent = '作成する';

    if (error) {
      errEl.textContent = /duplicate|unique|conflict/i.test(error.message || '')
        ? 'このコードは既に使われています。'
        : '作成できませんでした。';
      errEl.style.display = 'block';
      return;
    }
    modal.style.display = 'none';
    await loadSchools();
  });

  await loadSchools();
})();
</script>
</body>
</html>
