<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成績 — がくえん座 管理</title>
<link rel="stylesheet" href="../../style.css">
<link rel="stylesheet" href="../hub-shell.css">
<link rel="stylesheet" href="admin.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* Page-specific additions — small enough not to warrant touching
     admin.css yet; will likely move there once a second gradebook page
     exists and these stop being one-off. */
  .gb-flag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; margin-left: 8px; }
  .gb-flag-review { background: #fbe4e1; color: var(--error); }
  .gb-cat-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .gb-cat-row:last-child { border-bottom: none; }
  .gb-cat-name { width: 140px; flex: 0 0 auto; font-weight: 600; font-size: 0.85rem; }
  .gb-cat-bar-track { flex: 1; height: 8px; background: var(--paper-dim); border-radius: 999px; overflow: hidden; }
  .gb-cat-bar-fill { height: 100%; border-radius: 999px; }
  .gb-cat-pct { width: 50px; flex: 0 0 auto; text-align: right; font-size: 0.8rem; font-weight: 700; }
  .gb-item-row { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
  .gb-item-row:last-child { border-bottom: none; }
  .gb-item-prompt { font-weight: 600; margin-bottom: 4px; }
  .gb-item-answers { color: var(--ink-soft); font-size: 0.76rem; }
  .gb-wrong-answer { color: var(--error); font-family: monospace; }
  .gb-right-answer { color: var(--moss-deep); font-family: monospace; }
</style>
</head>
<body>

<div class="page-frame" id="app-root">
  <aside class="sidebar" id="sidebar-mount"></aside>

  <main class="main">
    <div class="ac-card" style="margin-bottom:16px;padding:6px;display:inline-flex;gap:4px;">
      <button class="ac-btn ac-btn-sm" id="btn-mode-analysis" type="button" style="background:var(--moss);color:var(--paper);">分析</button>
      <button class="ac-btn ac-btn-ghost-light ac-btn-sm" id="btn-mode-grid" type="button">表形式</button>
    </div>

    <div id="gb-mode-analysis">
      <div class="ac-card" id="picker-bar" style="margin-bottom:24px;">
        <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
          <div class="ac-field" style="margin-bottom:0;min-width:200px;">
            <label class="ac-field-label" for="picker-school">学校</label>
            <select id="picker-school"></select>
          </div>
          <div class="ac-field" style="margin-bottom:0;min-width:220px;">
            <label class="ac-field-label" for="picker-module">モジュール</label>
            <select id="picker-module"><option value="">— 選択してください —</option></select>
          </div>
        </div>
      </div>

      <div id="gb-empty" class="ac-empty">
        <p>学校とモジュールを選択すると、成績データが表示されます。</p>
      </div>

      <div id="gb-content" style="display:none;">
        <div class="ac-page-head">
          <h1 class="ac-page-title" id="gb-module-name">…</h1>
        </div>

        <div class="ac-stat-row" id="gb-stat-row" style="margin-bottom:32px;">
          <div class="ac-stat"><b id="gb-stat-attempts">—</b><span>実施回数</span></div>
          <div class="ac-stat"><b id="gb-stat-avg">—</b><span>平均正答率</span></div>
          <div class="ac-stat"><b id="gb-stat-students">—</b><span>受験した生徒</span></div>
        </div>

        <div class="ac-split">
          <div>
            <h2 class="section-title">分野別の正答率</h2>
            <p style="font-size:0.78rem;color:var(--ink-soft);margin:-4px 0 12px;">正答率が70%未満の分野は「要復習」として表示されます。</p>
            <div class="ac-card" id="gb-category-box">
              <div class="ac-skel" style="height:18px;margin-bottom:10px;"></div>
              <div class="ac-skel" style="height:18px;"></div>
            </div>

            <h2 class="section-title" style="margin-top:28px;">生徒ごとの得点</h2>
            <div id="gb-student-list" style="display:flex;flex-direction:column;gap:6px;">
              <div class="ac-card ac-skel" style="height:44px;"></div>
            </div>
          </div>

          <div>
            <h2 class="section-title">よく間違えられた問題</h2>
            <p style="font-size:0.78rem;color:var(--ink-soft);margin:-4px 0 12px;">正答率が低い順に表示しています。「あなたの答え」は生徒が実際に選んだ／入力した内容です。</p>
            <div class="ac-card" id="gb-missed-box" style="padding:0;overflow:hidden;">
              <div class="ac-skel" style="height:60px;margin:12px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ============================================================
         Spreadsheet mode (added 2026-07-09) — rows=students,
         columns=class_modules assignments, cells=best score, click to
         correct. Separate School+Class picker from analysis mode's
         School+Module picker, since a column here is "everything
         assigned to this class", not "one module across the school".
         ============================================================ -->
    <div id="gb-mode-grid" style="display:none;">
      <div class="ac-card" id="grid-picker-bar" style="margin-bottom:24px;">
        <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
          <div class="ac-field" style="margin-bottom:0;min-width:200px;">
            <label class="ac-field-label" for="grid-picker-school">学校</label>
            <select id="grid-picker-school"></select>
          </div>
          <div class="ac-field" style="margin-bottom:0;min-width:180px;">
            <label class="ac-field-label" for="grid-picker-class">クラス</label>
            <select id="grid-picker-class"><option value="">— 選択してください —</option></select>
          </div>
          <div class="ac-field" style="margin-bottom:0;min-width:220px;">
            <label class="ac-field-label" for="grid-picker-module">モジュール</label>
            <select id="grid-picker-module"><option value="">— 選択してください —</option></select>
          </div>
        </div>
      </div>

      <div id="grid-empty" class="ac-empty">
        <p>クラスとモジュールを選択すると、成績表が表示されます。</p>
      </div>

      <div id="grid-content" style="display:none;">
        <p style="font-size:0.78rem;color:var(--ink-soft);margin:0 0 16px;">列はこのモジュール内の課題（レベル・セットなど）ごとに分かれます。セルをクリックすると得点を修正できます。表示されるのは各生徒の最高得点です。</p>
        <div style="overflow-x:auto;">
          <table id="grid-table" style="border-collapse:collapse;width:100%;font-size:0.82rem;">
            <thead><tr id="grid-header-row"></tr></thead>
            <tbody id="grid-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../supabase.js"></script>
<script src="../config.js"></script>
<script src="../hub-common.js"></script>
<script src="admin-common.js"></script>
<script>
(async function () {
  const H = window.HubCommon;
  const esc = H.escapeHtml; // escape all DB-sourced text before innerHTML
  const AC = window.AdminCommon;
  const cfg = window.GAKUENZA_CONFIG;
  const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

  const session = await H.requireSession(sb);
  if (!session) return;
  const userId = session.user.id;

  // NOTE: gated the same as the rest of the admin console for now
  // (school_admin/coordinator/platform_admin). A plain classroom
  // 教員 (educator) is NOT included yet — RLS already lets them read
  // activity_results/activity_result_items school-wide (same policy
  // every staff role shares), but there's no "which classes does this
  // teacher teach" relationship anywhere in the schema yet to scope a
  // default view to just their own classes. Real teacher-facing access
  // is flagged as separate follow-up work, not solved here.
  const admin = await AC.requireGradebookAccess(sb, userId);
  if (!admin) return;

  const { data: profile } = await sb.from('profiles').select('display_name').eq('id', userId).maybeSingle();
  AC.renderAdminSidebar(sb, profile, 'gradebook', admin);

  const pickerSchool = document.getElementById('picker-school');
  const pickerModule = document.getElementById('picker-module');

  async function loadModulesForSchool(schoolId) {
    // Every module a school has ever enabled — not the global catalog,
    // so the dropdown doesn't list modules this school never used.
    const { data } = await sb
      .from('school_modules')
      .select('modules(id, key, name)')
      .eq('school_id', schoolId);
    const mods = (data || []).map(r => r.modules).filter(Boolean);
    pickerModule.innerHTML = '<option value="">— 選択してください —</option>' +
      mods.map(m => `<option value="${m.id}" data-name="${m.name}">${m.name}</option>`).join('');
  }

  async function refreshSchoolPicker() {
    const schools = await AC.getAccessibleSchools(sb, admin);
    if (!schools.length) {
      document.getElementById('picker-bar').style.display = 'none';
      return;
    }
    pickerSchool.innerHTML = schools.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    await loadModulesForSchool(schools[0].id);
  }
  pickerSchool.addEventListener('change', async () => {
    pickerModule.innerHTML = '<option value="">— 選択してください —</option>';
    document.getElementById('gb-content').style.display = 'none';
    document.getElementById('gb-empty').style.display = 'block';
    await loadModulesForSchool(pickerSchool.value);
  });
  pickerModule.addEventListener('change', () => {
    if (pickerModule.value) loadGradebook(pickerSchool.value, pickerModule.value);
  });

  function pct(correct, total) {
    return total > 0 ? Math.round((correct / total) * 100) : 0;
  }

  async function loadGradebook(schoolId, moduleId) {
    document.getElementById('gb-empty').style.display = 'none';
    document.getElementById('gb-content').style.display = 'block';
    const moduleName = pickerModule.selectedOptions[0]?.dataset.name || '';
    document.getElementById('gb-module-name').textContent = moduleName;

    const { data: results, error } = await sb
      .from('activity_results')
      .select('id, user_id, score, max_score, profiles(display_name), activity_result_items(category, correct, prompt, selected_answer, correct_answer)')
      .eq('school_id', schoolId)
      .eq('module_id', moduleId)
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('gb-category-box').innerHTML = '<p class="ac-calm-msg">読み込めませんでした</p>';
      return;
    }
    if (!results || !results.length) {
      document.getElementById('gb-stat-attempts').textContent = '0';
      document.getElementById('gb-stat-avg').textContent = '—';
      document.getElementById('gb-stat-students').textContent = '0';
      document.getElementById('gb-category-box').innerHTML = '<p class="ac-calm-msg">まだこのモジュールの実施記録がありません。</p>';
      document.getElementById('gb-student-list').innerHTML = '';
      document.getElementById('gb-missed-box').innerHTML = '<p class="ac-calm-msg" style="margin:12px;">データがありません。</p>';
      return;
    }

    // ── top stat row ──────────────────────────────────────────────────
    const totalScore = results.reduce((a, r) => a + (r.score || 0), 0);
    const totalMax = results.reduce((a, r) => a + (r.max_score || 0), 0);
    const uniqueStudents = new Set(results.map(r => r.user_id));
    document.getElementById('gb-stat-attempts').textContent = String(results.length);
    document.getElementById('gb-stat-avg').textContent = pct(totalScore, totalMax) + '%';
    document.getElementById('gb-stat-students').textContent = String(uniqueStudents.size);

    // ── category rollup (across every item in every attempt) ───────────
    const allItems = results.flatMap(r => r.activity_result_items || []);
    const byCategory = {};
    for (const it of allItems) {
      const cat = it.category || '(未分類)';
      (byCategory[cat] ||= { correct: 0, total: 0 });
      byCategory[cat].total++;
      if (it.correct) byCategory[cat].correct++;
    }
    const catEntries = Object.entries(byCategory).sort((a, b) => (a[1].correct / a[1].total) - (b[1].correct / b[1].total));
    if (!catEntries.length) {
      document.getElementById('gb-category-box').innerHTML = '<p class="ac-calm-msg">このモジュールは分野別データを報告していません。</p>';
    } else {
      document.getElementById('gb-category-box').innerHTML = catEntries.map(([cat, d]) => {
        const p = pct(d.correct, d.total);
        const needsReview = p < 70;
        const color = needsReview ? 'var(--error)' : 'var(--moss)';
        return `
          <div class="gb-cat-row">
            <div class="gb-cat-name">${esc(cat)}${needsReview ? '<span class="gb-flag gb-flag-review">要復習</span>' : ''}</div>
            <div class="gb-cat-bar-track"><div class="gb-cat-bar-fill" style="width:${p}%;background:${color};"></div></div>
            <div class="gb-cat-pct">${p}%</div>
          </div>`;
      }).join('');
    }

    // ── per-student score list ──────────────────────────────────────────
    document.getElementById('gb-student-list').innerHTML = results.map(r => `
      <div class="ac-card ac-person-card" style="padding:10px 14px;">
        <div style="flex:1;min-width:0;">
          <div class="ac-roster-name">${esc(r.profiles?.display_name || '(表示名未設定)')}</div>
        </div>
        <div style="font-weight:700;font-size:0.9rem;">${r.score} / ${r.max_score}</div>
      </div>`).join('');

    // ── most commonly missed items (lowest accuracy first) ──────────────
    const byPrompt = {};
    for (const it of allItems) {
      if (!it.prompt) continue;
      (byPrompt[it.prompt] ||= { correct: 0, total: 0, wrongAnswers: [], correctAnswer: it.correct_answer });
      byPrompt[it.prompt].total++;
      if (it.correct) byPrompt[it.prompt].correct++;
      else if (it.selected_answer) byPrompt[it.prompt].wrongAnswers.push(it.selected_answer);
    }
    const missedEntries = Object.entries(byPrompt)
      .filter(([, d]) => d.correct < d.total) // only prompts with at least one miss
      .sort((a, b) => (a[1].correct / a[1].total) - (b[1].correct / b[1].total))
      .slice(0, 10);

    if (!missedEntries.length) {
      document.getElementById('gb-missed-box').innerHTML = '<p class="ac-calm-msg" style="margin:12px;">全員が正解した問題のみでした。</p>';
    } else {
      document.getElementById('gb-missed-box').innerHTML = missedEntries.map(([prompt, d]) => {
        // Most frequently chosen wrong answer — the actual distractor signal.
        const counts = {};
        d.wrongAnswers.forEach(a => { counts[a] = (counts[a] || 0) + 1; });
        const topWrong = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
        return `
          <div class="gb-item-row">
            <div class="gb-item-prompt">${esc(prompt)}</div>
            <div class="gb-item-answers">
              正答率 ${pct(d.correct, d.total)}%（${d.total}人中${d.total - d.correct}人が誤答）
              ${topWrong ? `<br>よくある誤答：<span class="gb-wrong-answer">${esc(topWrong[0])}</span>（${topWrong[1]}人）　正解：<span class="gb-right-answer">${esc(d.correctAnswer)}</span>` : ''}
            </div>
          </div>`;
      }).join('');
    }
  }

  // ── mode toggle ──────────────────────────────────────────────────────
  const btnModeAnalysis = document.getElementById('btn-mode-analysis');
  const btnModeGrid = document.getElementById('btn-mode-grid');
  let gridInitialized = false;
  function setMode(mode) {
    const isGrid = mode === 'grid';
    document.getElementById('gb-mode-analysis').style.display = isGrid ? 'none' : 'block';
    document.getElementById('gb-mode-grid').style.display = isGrid ? 'block' : 'none';
    btnModeAnalysis.className = isGrid ? 'ac-btn ac-btn-ghost-light ac-btn-sm' : 'ac-btn ac-btn-sm';
    btnModeGrid.className = isGrid ? 'ac-btn ac-btn-sm' : 'ac-btn ac-btn-ghost-light ac-btn-sm';
    if (isGrid) btnModeGrid.style.background = 'var(--moss)', btnModeGrid.style.color = 'var(--paper)';
    else btnModeAnalysis.style.background = 'var(--moss)', btnModeAnalysis.style.color = 'var(--paper)';
    if (isGrid && !gridInitialized) {
      gridInitialized = true;
      initGridMode();
    }
  }
  btnModeAnalysis.addEventListener('click', () => setMode('analysis'));
  btnModeGrid.addEventListener('click', () => setMode('grid'));

  // ── spreadsheet grid mode ────────────────────────────────────────────
  async function initGridMode() {
    const gridPickerSchool = document.getElementById('grid-picker-school');
    const gridPickerClass = document.getElementById('grid-picker-class');
    const gridPickerModule = document.getElementById('grid-picker-module');

    const schools = await AC.getAccessibleSchools(sb, admin);
    if (!schools.length) {
      document.getElementById('grid-picker-bar').style.display = 'none';
      return;
    }
    gridPickerSchool.innerHTML = schools.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

    async function loadClassesForGrid(schoolId) {
      const { data } = await sb.from('classes').select('id, name').eq('school_id', schoolId).order('year').order('gumi');
      let classes = data || [];
      // An educator only ever sees classes they're actually assigned to
      // teach — not every class in the school, even though they can
      // technically pick their own (single) school like any scoped
      // admin can. This is the one place that distinction actually
      // matters in this page.
      if (admin.tier === 'educator') {
        const taught = new Set(admin.taughtClassIds || []);
        classes = classes.filter(c => taught.has(c.id));
      }
      gridPickerClass.innerHTML = '<option value="">— 選択してください —</option>' +
        classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      gridPickerModule.innerHTML = '<option value="">— 選択してください —</option>';
      if (admin.tier === 'educator' && classes.length === 0) {
        document.getElementById('grid-empty').innerHTML = '<p>担当しているクラスがまだ登録されていません。管理者にクラスの割り当てを依頼してください。</p>';
      }
    }

    async function loadModulesForClass(classId) {
      const { data } = await sb.from('class_modules').select('module_id, modules(id, name)').eq('class_id', classId);
      const mods = (data || []).filter(a => a.modules).map(a => a.modules);
      gridPickerModule.innerHTML = '<option value="">— 選択してください —</option>' +
        mods.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
    }

    gridPickerSchool.addEventListener('change', async () => {
      document.getElementById('grid-content').style.display = 'none';
      document.getElementById('grid-empty').style.display = 'block';
      await loadClassesForGrid(gridPickerSchool.value);
    });
    gridPickerClass.addEventListener('change', async () => {
      document.getElementById('grid-content').style.display = 'none';
      document.getElementById('grid-empty').style.display = 'block';
      if (gridPickerClass.value) await loadModulesForClass(gridPickerClass.value);
      else gridPickerModule.innerHTML = '<option value="">— 選択してください —</option>';
    });
    gridPickerModule.addEventListener('change', () => {
      if (gridPickerClass.value && gridPickerModule.value) {
        loadGrid(gridPickerClass.value, gridPickerModule.value);
      }
    });

    await loadClassesForGrid(schools[0].id);
  }

  // Every module's report shim builds activity_ref as
  // `<module>/<part>/<part>/<timestamp>` (confirmed against eiken, nh6,
  // and shakai3's report shims directly, not assumed) — stripping the
  // trailing timestamp segment gives a stable key identifying "the same
  // recurring assignment" across however many times a student retried
  // it, without needing per-module-specific parsing here.
  function assignmentKeyFromRef(activityRef) {
    const parts = String(activityRef).split('/');
    const last = parts[parts.length - 1];
    if (parts.length > 1 && /^\d+$/.test(last)) return parts.slice(0, -1).join('/');
    return activityRef;
  }

  // Best-effort human-readable column label from whatever shape this
  // module's payload happens to use — falls back to the raw assignment
  // key (still meaningful, just less pretty) for any module whose
  // payload doesn't match one of the known shapes.
  function assignmentLabel(key, samplePayload) {
    const p = samplePayload || {};
    if (p.level && p.set) return `Lv.${p.level} Set${p.set}`;
    if (p.section) return p.section;
    if (p.unit) return `Unit ${p.unit}`;
    return key;
  }

  async function loadGrid(classId, moduleId) {
    document.getElementById('grid-empty').style.display = 'none';
    document.getElementById('grid-content').style.display = 'block';

    const rosterRes = await sb.from('enrollments').select('user_id, profiles(display_name)').eq('class_id', classId).eq('role', 'student');
    const students = rosterRes.data || [];

    if (!students.length) {
      document.getElementById('grid-table').innerHTML = '';
      document.getElementById('grid-content').innerHTML = '<p class="ac-calm-msg">このクラスにはまだ生徒がいません。</p>';
      return;
    }

    const studentIds = students.map(s => s.user_id);
    const { data: results } = await sb
      .from('activity_results')
      .select('id, user_id, activity_ref, score, max_score, payload, created_at')
      .in('user_id', studentIds)
      .eq('module_id', moduleId)
      .eq('class_id', classId);

    if (!results || !results.length) {
      document.getElementById('grid-table').innerHTML = '';
      document.getElementById('grid-content').innerHTML = '<p class="ac-calm-msg">このモジュールの実施記録がまだありません。</p>';
      return;
    }

    // Distinct assignments within this module, in first-seen order —
    // NOT one column per module (that was the earlier design); each
    // column here is one recurring activity (a level/set, a section,
    // etc.) within the single module the teacher picked.
    const columnOrder = [];
    const columnSamplePayload = {};
    for (const r of results) {
      const key = assignmentKeyFromRef(r.activity_ref);
      if (!columnOrder.includes(key)) {
        columnOrder.push(key);
        columnSamplePayload[key] = r.payload;
      }
    }

    // Best score per (student, assignment) — highest raw score wins;
    // most recent breaks ties. Same documented default as before: a
    // retry should reflect what a student has since demonstrated, not
    // get averaged down by an earlier attempt.
    const best = {}; // `${user_id}::${assignmentKey}` -> result row
    for (const r of results) {
      const assignKey = assignmentKeyFromRef(r.activity_ref);
      const key = `${r.user_id}::${assignKey}`;
      const cur = best[key];
      if (!cur || r.score > cur.score || (r.score === cur.score && r.created_at > cur.created_at)) {
        best[key] = r;
      }
    }

    document.getElementById('grid-header-row').innerHTML =
      '<th style="text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);position:sticky;left:0;background:var(--paper);">生徒</th>' +
      columnOrder.map(key => `<th style="text-align:center;padding:8px 12px;border-bottom:2px solid var(--border);white-space:nowrap;">${esc(assignmentLabel(key, columnSamplePayload[key]))}</th>`).join('');

    document.getElementById('grid-body').innerHTML = students.map(s => {
      const cells = columnOrder.map(key => {
        const r = best[`${s.user_id}::${key}`];
        if (!r) return `<td style="text-align:center;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--ink-soft);">—</td>`;
        return `<td class="grid-cell" data-result-id="${r.id}" data-score="${r.score}" data-max="${r.max_score}"
          style="text-align:center;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;" title="クリックして修正">${r.score} / ${r.max_score}</td>`;
      }).join('');
      return `<tr><td style="padding:8px 12px;border-bottom:1px solid var(--border);font-weight:600;position:sticky;left:0;background:var(--paper);white-space:nowrap;">${esc(s.profiles?.display_name || '(表示名未設定)')}</td>${cells}</tr>`;
    }).join('');

    document.querySelectorAll('.grid-cell').forEach(cell => {
      cell.addEventListener('click', () => editCell(cell));
    });
  }

  function editCell(cell) {
    if (cell.querySelector('input')) return; // already editing
    const resultId = cell.dataset.resultId;
    const currentScore = cell.dataset.score;
    const maxScore = cell.dataset.max;
    const originalHTML = cell.innerHTML;

    cell.innerHTML = `<input type="number" min="0" max="${maxScore}" value="${currentScore}" style="width:50px;text-align:center;border:1.5px solid var(--moss);border-radius:4px;padding:2px 4px;"> / ${maxScore}`;
    const input = cell.querySelector('input');
    input.focus();
    input.select();

    async function save() {
      const newScore = Number(input.value);
      if (Number.isNaN(newScore) || newScore < 0 || newScore > Number(maxScore)) {
        cell.innerHTML = originalHTML;
        return;
      }
      if (String(newScore) === currentScore) {
        cell.innerHTML = originalHTML;
        return;
      }
      cell.style.opacity = '0.5';
      const { error } = await sb.from('activity_results').update({ score: newScore }).eq('id', resultId);
      cell.style.opacity = '1';
      if (error) {
        alert('修正できませんでした。');
        cell.innerHTML = originalHTML;
        return;
      }
      cell.dataset.score = String(newScore);
      cell.innerHTML = `${newScore} / ${maxScore}`;
    }
    input.addEventListener('blur', save);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { cell.innerHTML = originalHTML; }
    });
  }

  await refreshSchoolPicker();
})();
</script>
</body>
</html>
