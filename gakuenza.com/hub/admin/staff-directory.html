<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタッフ名簿 — がくえん座 管理</title>
<link rel="stylesheet" href="../hub-shell.css">
<link rel="stylesheet" href="admin.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ============================================================
     Cross-school staff directory (roadmap #9, 2026-07-23).
     Read-only aggregation of every staff school_members row the caller
     can SELECT: a platform admin sees all schools; a scoped admin sees
     only their own school(s). Groups rows by person so a coordinator
     scoped to several schools shows their full footprint on one card.
     Purely a read view — every row already passes members_read /
     members_admin_write RLS, so no new policy or Edge Function is needed.
     What it deliberately does NOT do: tell you whether an arbitrary
     EMAIL already has an account. Emails live in auth.users, unreadable
     from the anon key; that check needs a service_role lookup and is
     specced separately (SPEC_admin_staff_management.md, gap #4b).
     ============================================================ -->
<div class="page-frame" id="app-root">
  <aside class="sidebar" id="sidebar-mount"></aside>

  <main class="main">
    <div class="ac-page-head">
      <div>
        <div class="ac-breadcrumb" style="margin-bottom:4px;">閲覧専用・全校まとめ</div>
        <h1 class="ac-page-title">スタッフ名簿</h1>
      </div>
    </div>
    <p style="font-size:0.85rem;color:var(--ink-soft);margin:-8px 0 20px;max-width:640px;line-height:1.6;">
      あなたが閲覧できるすべての学校の教職員を、担当校ごとにまとめた<strong>閲覧専用</strong>の一覧です。
      同じ人が複数の学校を担当している場合は、1枚のカードにまとめて表示されます。<br>
      教職員の<strong>追加・編集・削除・役割の変更</strong>は、学校ごとの「<strong>教員</strong>」ページで行います。
    </p>

    <div class="ac-card" style="margin-bottom:20px;">
      <div class="ac-field" style="margin-bottom:0;max-width:360px;">
        <label class="ac-field-label" for="dir-search">名前・学校名で検索</label>
        <input id="dir-search" type="search" autocomplete="off" placeholder="例：田中 / 瑞穂小学校">
      </div>
    </div>

    <!-- Email lookup (Gap #4b) — platform-admin only. Answers "does this
         email already have an account?" across every tenant, via the
         lookup-account Edge Function (service_role; emails live in
         auth.users, unreadable from the anon key). Shown only to platform
         admins; the function re-checks and rejects everyone else. -->
    <div class="ac-card" id="lookup-card" style="margin-bottom:20px;display:none;">
      <div class="ac-field" style="margin-bottom:12px;">
        <label class="ac-field-label" for="lookup-email">メールアドレスでアカウントを確認</label>
        <p style="font-size:0.76rem;color:var(--ink-soft);line-height:1.5;margin:0 0 8px;">このメールアドレスが既にアカウントを持っているか（全校横断で）を確認します。</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;">
          <input id="lookup-email" type="email" autocomplete="off" placeholder="例：teacher@example.com" style="flex:1;min-width:220px;max-width:360px;">
          <button class="ac-btn ac-btn-accent ac-btn-md" type="button" id="btn-lookup">確認</button>
        </div>
      </div>
      <p class="ac-modal-err" id="lookup-err" style="display:none;"></p>
      <div id="lookup-result" style="display:none;"></div>
    </div>

    <div id="dir-summary" style="font-size:0.8rem;color:var(--ink-soft);margin:0 0 14px;"></div>

    <div id="dir-list" style="display:flex;flex-direction:column;gap:10px;max-width:760px;">
      <div class="ac-card ac-skel" style="height:64px;"></div>
      <div class="ac-card ac-skel" style="height:64px;"></div>
      <div class="ac-card ac-skel" style="height:64px;"></div>
    </div>
  </main>
</div>

<script src="../supabase.js"></script>
<script src="../config.js"></script>
<script src="../hub-common.js"></script>
<script src="admin-common.js"></script>
<script>
(async function () {
  const H = window.HubCommon;
  const AC = window.AdminCommon;
  const cfg = window.GAKUENZA_CONFIG;
  const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

  const session = await H.requireSession(sb, '../login.html');
  if (!session) return;
  const userId = session.user.id;

  const admin = await AC.requireAdminAccess(sb, userId);
  if (!admin) return;

  const { data: profile } = await sb.from('profiles').select('display_name').eq('id', userId).maybeSingle();
  AC.renderAdminSidebar(sb, profile, 'staff-directory', admin);

  const ROLE_LABEL = { school_admin: '管理者', coordinator: 'コーディネーター', educator: '教員' };
  const ROLE_RANK = { school_admin: 0, coordinator: 1, educator: 2 };
  const listEl = document.getElementById('dir-list');
  const summaryEl = document.getElementById('dir-summary');
  const searchEl = document.getElementById('dir-search');

  // people: user_id -> { name, memberships: [{schoolName, role}] }
  let people = [];

  async function load() {
    // RLS returns exactly the staff rows this caller may see: all schools
    // for a platform admin, own school(s) for a scoped admin. No school
    // filter here on purpose — the whole point is the cross-school view.
    const { data, error } = await sb
      .from('school_members')
      .select('user_id, school_id, role, profiles(display_name), schools(name)')
      .in('role', ['school_admin', 'coordinator', 'educator']);

    if (error) {
      listEl.innerHTML = '<p class="ac-calm-msg">読み込めませんでした</p>';
      return;
    }
    if (!data || data.length === 0) {
      listEl.innerHTML = '<p class="ac-calm-msg">表示できる教職員がいません。</p>';
      summaryEl.textContent = '';
      return;
    }

    const byUser = new Map();
    for (const row of data) {
      let p = byUser.get(row.user_id);
      if (!p) {
        p = { userId: row.user_id, name: row.profiles?.display_name || '(表示名未設定)', memberships: [] };
        byUser.set(row.user_id, p);
      }
      p.memberships.push({ schoolName: row.schools?.name || '(不明な学校)', role: row.role });
    }
    people = [...byUser.values()].map(p => {
      p.memberships.sort((a, b) =>
        (ROLE_RANK[a.role] - ROLE_RANK[b.role]) || a.schoolName.localeCompare(b.schoolName, 'ja'));
      return p;
    }).sort((a, b) => a.name.localeCompare(b.name, 'ja'));

    render(people);
  }

  function render(rows) {
    const totalSchools = new Set(rows.flatMap(p => p.memberships.map(m => m.schoolName))).size;
    const multi = rows.filter(p => new Set(p.memberships.map(m => m.schoolName)).size > 1).length;
    summaryEl.textContent =
      `教職員 ${rows.length}名 ・ ${totalSchools}校` + (multi ? ` ・ 複数校を担当 ${multi}名` : '');

    if (!rows.length) {
      listEl.innerHTML = '<p class="ac-calm-msg">条件に一致する教職員が見つかりません。</p>';
      return;
    }

    listEl.innerHTML = rows.map(p => {
      const given = H.givenName(p.name);
      const schoolCount = new Set(p.memberships.map(m => m.schoolName)).size;
      const footprint = p.memberships.map(m => `
        <span style="display:inline-flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--ink-soft);white-space:nowrap;">
          <span class="ac-badge ${m.role === 'school_admin' ? 'ac-badge-gold' : 'ac-badge-moss'}">${ROLE_LABEL[m.role] || m.role}</span>
          ${H.escapeHtml(m.schoolName)}
        </span>`).join('');
      const multiBadge = schoolCount > 1
        ? `<span class="ac-badge ac-badge-gold" title="複数校を担当">${schoolCount}校</span>`
        : '';
      return `
        <div class="ac-card ac-person-card" style="align-items:flex-start;">
          <div class="ac-avatar-sm">${H.escapeHtml(given.slice(0, 2) || '?')}</div>
          <div style="flex:1;min-width:0;">
            <div class="ac-roster-name" title="${H.escapeHtml(p.name)}">${H.escapeHtml(p.name)}</div>
            <div style="display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:8px;">${footprint}</div>
          </div>
          ${multiBadge}
        </div>`;
    }).join('');
  }

  searchEl.addEventListener('input', () => {
    const q = searchEl.value.trim().toLowerCase();
    if (!q) { render(people); return; }
    const filtered = people.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.memberships.some(m => m.schoolName.toLowerCase().includes(q)));
    render(filtered);
  });

  // ── email lookup (Gap #4b, platform-admin only) ─────────────────────
  // Calls the lookup-account Edge Function, which re-authorizes as
  // platform-admin-only server-side and returns a deliberately minimal
  // projection (display_name + caller-visible school footprint, never
  // is_platform_admin or auth internals). We only reveal the card to a
  // platform admin here; the function is the real boundary.
  if (admin.isPlatformAdmin) {
    document.getElementById('lookup-card').style.display = '';
    const lookupEmail = document.getElementById('lookup-email');
    const lookupBtn = document.getElementById('btn-lookup');
    const lookupErr = document.getElementById('lookup-err');
    const lookupResult = document.getElementById('lookup-result');

    async function runLookup() {
      const email = lookupEmail.value.trim();
      lookupErr.style.display = 'none';
      lookupResult.style.display = 'none';
      lookupResult.innerHTML = '';
      if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
        lookupErr.textContent = 'メールアドレスの形式が正しくありません。';
        lookupErr.style.display = 'block';
        return;
      }
      lookupBtn.disabled = true;
      const prevText = lookupBtn.textContent;
      lookupBtn.textContent = '確認中…';
      try {
        const res = await fetch(`${cfg.supabaseUrl}/functions/v1/lookup-account`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.access_token}`,
          },
          body: JSON.stringify({ email }),
        });
        const body = await res.json();
        if (!res.ok || !body.ok) {
          lookupErr.textContent = body.error || '確認できませんでした。';
          lookupErr.style.display = 'block';
          return;
        }
        if (!body.exists) {
          lookupResult.innerHTML = `
            <div style="display:flex;align-items:center;gap:10px;padding-top:12px;border-top:1px solid var(--border);">
              <span class="ac-badge ac-badge-moss">未登録</span>
              <span style="font-size:0.85rem;color:var(--ink-soft);">${H.escapeHtml(email)} のアカウントはまだありません。</span>
            </div>`;
          lookupResult.style.display = 'block';
          return;
        }
        const acct = body.account || {};
        const schools = Array.isArray(acct.schools) ? acct.schools : [];
        const footprint = schools.length
          ? schools.map(s => `
              <span style="display:inline-flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--ink-soft);white-space:nowrap;">
                <span class="ac-badge ${s.role === 'school_admin' ? 'ac-badge-gold' : 'ac-badge-moss'}">${ROLE_LABEL[s.role] || H.escapeHtml(s.role || '')}</span>
                ${H.escapeHtml(s.name || '(不明な学校)')}
              </span>`).join('')
          : '<span style="font-size:0.78rem;color:var(--ink-soft);">担当校の登録はありません。</span>';
        lookupResult.innerHTML = `
          <div style="padding-top:12px;border-top:1px solid var(--border);">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
              <span class="ac-badge ac-badge-gold">登録済み</span>
              <span class="ac-roster-name">${H.escapeHtml(acct.display_name || '(表示名未設定)')}</span>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:10px 16px;">${footprint}</div>
          </div>`;
        lookupResult.style.display = 'block';
      } catch (err) {
        lookupErr.textContent = 'ネットワークエラーが発生しました。もう一度お試しください。';
        lookupErr.style.display = 'block';
      } finally {
        lookupBtn.disabled = false;
        lookupBtn.textContent = prevText;
      }
    }
    lookupBtn.addEventListener('click', runLookup);
    lookupEmail.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); runLookup(); }
    });
  }

  await load();
})();
</script>
</body>
</html>
