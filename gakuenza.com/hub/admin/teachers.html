<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教員 — がくえん座 管理</title>
<link rel="stylesheet" href="../hub-shell.css">
<link rel="stylesheet" href="admin.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="page-frame" id="app-root">
  <aside class="sidebar" id="sidebar-mount"></aside>

  <main class="main">
    <!-- Same school-picker convention as class-detail.html — always
         shown, not just for platform admins with multiple schools, so
         the UI doesn't change shape between admin types. Creating a
         school moved to its own platform-admin-only 学校 tab
         (schools.html). -->
    <div class="ac-card" id="picker-bar" style="margin-bottom:24px;">
      <div style="display:flex;align-items:flex-end;gap:16px;">
        <div class="ac-field" style="margin-bottom:0;max-width:280px;flex:1;">
          <label class="ac-field-label" for="picker-school">学校</label>
          <select id="picker-school"></select>
        </div>
      </div>
    </div>

    <div class="ac-page-head">
      <h1 class="ac-page-title">教員</h1>
      <button class="ac-btn ac-btn-accent ac-btn-sm" type="button" id="btn-add-teacher" disabled style="display:none;">+ 教員を追加</button>
    </div>

    <div id="teacher-list" class="ac-grid">
      <div class="ac-card ac-skel" style="height:64px;"></div>
      <div class="ac-card ac-skel" style="height:64px;"></div>
      <div class="ac-card ac-skel" style="height:64px;"></div>
    </div>
  </main>
</div>

<!-- ============================================================ -->
<!-- Create-teacher/admin modal — same one-time-password-reveal
     pattern as add-student in class-detail.html, adapted for a real
     email login instead of a synthetic one. -->
<!-- ============================================================ -->
<div class="ac-modal-backdrop" id="modal-add-teacher" style="display:none;">
  <div class="ac-modal" style="width:420px;">
    <div class="ac-modal-eyebrow" id="add-teacher-school-name">…</div>
    <h2 class="ac-modal-title">教員を追加</h2>
    <form id="form-add-teacher">
      <div class="ac-field">
        <label class="ac-field-label" for="input-teacher-email">メールアドレス</label>
        <input id="input-teacher-email" type="email" required maxlength="120" autocomplete="off">
      </div>
      <div class="ac-field">
        <label class="ac-field-label" for="input-teacher-name">表示名</label>
        <input id="input-teacher-name" required maxlength="80" autocomplete="off">
      </div>
      <div class="ac-field" style="margin-bottom:20px;">
        <label class="ac-field-label" for="select-teacher-role">役割</label>
        <select id="select-teacher-role">
          <option value="teacher">教員</option>
          <option value="admin">管理者</option>
          <option value="coordinator">コーディネーター</option>
        </select>
      </div>
      <p class="ac-modal-err" id="add-teacher-err" style="display:none;"></p>
      <p style="font-size:0.76rem;color:var(--ink-soft);line-height:1.5;margin:0;">作成すると、ログイン用の初期パスワードが自動生成されます。次の画面で一度だけ表示されます。</p>
      <div class="ac-modal-actions">
        <button class="ac-btn ac-btn-ghost-light ac-btn-md" type="button" id="btn-cancel-add-teacher">キャンセル</button>
        <button class="ac-btn ac-btn-accent ac-btn-md" type="submit" id="btn-submit-add-teacher">作成する</button>
      </div>
    </form>
  </div>
</div>

<!-- ============================================================ -->
<!-- Edit-teacher modal (added 2026-07-09) — top-tier only, both by UI
     gating and by update-teacher's own server-side authorization.
     Admin-typed password, same convention as edit-student.
     Role change + remove-from-school added 2026-07-23 (roadmap #9):
     both write school_members directly via the anon-key client, gated by
     the members_admin_write RLS policy (school_admin of THIS school, or a
     platform admin). Hidden when editing your own row (self-lockout). -->
<!-- ============================================================ -->
<div class="ac-modal-backdrop" id="modal-edit-teacher" style="display:none;">
  <div class="ac-modal" style="width:400px;">
    <h2 class="ac-modal-title">教員情報を編集</h2>
    <form id="form-edit-teacher">
      <div class="ac-field">
        <label class="ac-field-label" for="edit-teacher-name">表示名</label>
        <input id="edit-teacher-name" required maxlength="80" autocomplete="off">
      </div>
      <div class="ac-field" id="edit-teacher-role-field">
        <label class="ac-field-label" for="edit-teacher-role">役割</label>
        <select id="edit-teacher-role">
          <option value="educator">教員</option>
          <option value="school_admin">管理者</option>
          <option value="coordinator">コーディネーター</option>
        </select>
      </div>
      <div class="ac-field" style="margin-bottom:20px;">
        <label class="ac-field-label" for="edit-teacher-password">新しいパスワード（変更する場合のみ）</label>
        <input id="edit-teacher-password" type="password" autocomplete="new-password" placeholder="変更しない場合は空欄のまま">
      </div>
      <p class="ac-modal-err" id="edit-teacher-err" style="display:none;"></p>
      <div class="ac-modal-actions">
        <button class="ac-btn ac-btn-ghost-light ac-btn-md" type="button" id="btn-cancel-edit-teacher">キャンセル</button>
        <button class="ac-btn ac-btn-accent ac-btn-md" type="submit" id="btn-submit-edit-teacher">保存する</button>
      </div>
      <!-- Remove-from-school (danger): deletes THIS school's school_members
           row. The login account + profile are kept, mirroring remove-student
           on class-detail.html — this only removes staff membership here. -->
      <div id="edit-teacher-danger" style="border-top:1px solid var(--border);margin-top:18px;padding-top:16px;">
        <!-- Soft-disable (Gap #2b): bans / unbans the login at the auth layer
             via the set-staff-active Edge Function (service_role). Distinct
             from "remove from school" (which keeps the account usable, just
             unaffiliated). Because ban state is not readable from the anon
             key, both actions are offered rather than a single stateful
             toggle — the admin picks 停止 or 再開. Hidden for a self-edit. -->
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
          <button class="ac-btn ac-btn-ghost-light ac-btn-sm" type="button" id="btn-disable-teacher">利用停止</button>
          <button class="ac-btn ac-btn-ghost-light ac-btn-sm" type="button" id="btn-enable-teacher">利用再開</button>
        </div>
        <p style="font-size:0.72rem;color:var(--ink-soft);line-height:1.5;margin:0 0 14px;">利用停止中はログインできなくなりますが、アカウントと記録は保持され、いつでも再開できます。</p>
        <button class="ac-btn-danger" type="button" id="btn-remove-teacher">この学校の教員から外す</button>
      </div>
    </form>
  </div>
</div>

<!-- ============================================================ -->
<!-- Coordinator scope modal (#114, platform-admin only) — cross-school
     checklist of which schools a coordinator has authority over. Mirrors
     class-detail.html's teacher-assignment checklist (checked = has a
     school_members row), just keyed on (school, this coordinator,
     role='coordinator') instead of (this class, staff member). -->
<!-- ============================================================ -->
<div class="ac-modal-backdrop" id="modal-scope" style="display:none;">
  <div class="ac-modal" style="width:400px;">
    <div class="ac-modal-eyebrow" id="scope-modal-name">…</div>
    <h2 class="ac-modal-title">担当する学校を編集</h2>
    <div id="scope-checklist" style="max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
      <div class="ac-skel" style="height:20px;"></div>
    </div>
    <p class="ac-modal-err" id="scope-modal-err" style="display:none;"></p>
    <div class="ac-modal-actions">
      <button class="ac-btn ac-btn-ghost-light ac-btn-md" type="button" id="btn-cancel-scope">キャンセル</button>
      <button class="ac-btn ac-btn-accent ac-btn-md" type="button" id="btn-submit-scope">保存する</button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- One-time password reveal — same gold-bordered, no-backdrop-close
     pattern as class-detail.html's student version. Kept as its own
     copy on this page rather than shared markup across pages, same as
     every other admin page so far. -->
<!-- ============================================================ -->
<div class="ac-modal-backdrop" id="modal-password" style="display:none;">
  <div class="ac-modal ac-modal-gold" style="width:460px;">
    <div style="margin-bottom:14px;"><span class="ac-badge ac-badge-gold">今だけ表示</span></div>
    <h2 class="ac-modal-title" style="margin-bottom:6px;">教員を追加しました</h2>
    <p style="font-size:0.82rem;color:var(--ink-soft);margin:0 0 20px;line-height:1.55;">このログイン情報を書き写すか、そのまま本人に伝えてください。<strong style="color:var(--error);">閉じると二度と表示できません。</strong></p>

    <div class="ac-identity-box">
      <div>
        <div class="ac-identity-label">学校</div>
        <div class="ac-identity-value" id="reveal-school">…</div>
      </div>
      <div>
        <div class="ac-identity-label">メールアドレス</div>
        <div class="ac-identity-value ac-mono" id="reveal-email">…</div>
      </div>
      <div>
        <div class="ac-identity-label">初期パスワード</div>
        <div class="ac-password-value" id="reveal-password">…</div>
      </div>
    </div>

    <p style="font-size:0.74rem;color:var(--ink-soft);margin:0 0 20px;">パスワードの再表示はできません。</p>

    <div class="ac-modal-actions" style="margin-top:0;">
      <button class="ac-btn ac-btn-ghost-light ac-btn-md" type="button" id="btn-print-reveal">印刷する</button>
      <button class="ac-btn ac-btn-accent ac-btn-md" type="button" id="btn-close-reveal">確認して閉じる</button>
    </div>
  </div>
</div>

<script src="../supabase.js"></script>
<script src="../config.js"></script>
<script src="../hub-common.js"></script>
<script src="admin-common.js"></script>
<script>
(async function () {
  const H = window.HubCommon;
  const AC = window.AdminCommon;
  const cfg = window.GAKUENZA_CONFIG;
  const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

  const session = await H.requireSession(sb, '../login.html');
  if (!session) return;
  const userId = session.user.id;

  const admin = await AC.requireAdminAccess(sb, userId);
  if (!admin) return;

  const { data: profile } = await sb.from('profiles').select('display_name').eq('id', userId).maybeSingle();
  AC.renderAdminSidebar(sb, profile, 'teachers', admin);

  const pickerSchool = document.getElementById('picker-school');
  const listEl = document.getElementById('teacher-list');
  const btnAddTeacher = document.getElementById('btn-add-teacher');
  let schools = [];
  let currentSchoolName = '';

  async function loadTeachers(schoolId) {
    listEl.innerHTML = `
      <div class="ac-card ac-skel" style="height:64px;"></div>
      <div class="ac-card ac-skel" style="height:64px;"></div>`;
    const { data, error } = await sb
      .from('school_members')
      .select('user_id, role, profiles(display_name)')
      .eq('school_id', schoolId)
      .in('role', ['school_admin', 'coordinator', 'educator'])
      .order('role');

    if (error) {
      listEl.innerHTML = '<p class="ac-calm-msg">読み込めませんでした</p>';
      return;
    }
    if (!data || data.length === 0) {
      listEl.innerHTML = '<p class="ac-calm-msg">この学校にはまだ教員が登録されていません。</p>';
      return;
    }
    listEl.innerHTML = data.map(m => {
      const name = m.profiles?.display_name || '(表示名未設定)';
      const given = H.givenName(name);
      const isAdmin = m.role === 'school_admin';
      const isCoordinatorRow = m.role === 'coordinator';
      const roleLabel = isAdmin ? '管理者' : isCoordinatorRow ? 'コーディネーター' : '教員';
      const editBtn = admin.canManageStaff
        ? `<button class="ac-btn ac-btn-ghost-light ac-btn-sm" data-action="edit-teacher" data-user-id="${m.user_id}" data-name="${name.replace(/"/g, '')}" data-role="${m.role}" type="button">編集</button>`
        : '';
      // Scope-granting is platform-admin-only and only meaningful for
      // coordinator rows (#114) — a school_admin/educator's schools are
      // fixed to whichever school they were created under, only a
      // coordinator can be scoped to more than one.
      const scopeBtn = admin.isPlatformAdmin && isCoordinatorRow
        ? `<button class="ac-btn ac-btn-ghost-light ac-btn-sm" data-action="edit-scope" data-user-id="${m.user_id}" data-name="${name.replace(/"/g, '')}" type="button">担当校を編集</button>`
        : '';
      return `
        <div class="ac-card ac-person-card">
          <div class="ac-avatar-sm">${H.escapeHtml(given.slice(0, 2) || '?')}</div>
          <div style="flex:1;min-width:0;">
            <div class="ac-roster-name" title="${H.escapeHtml(name)}">${H.escapeHtml(name)}</div>
          </div>
          <span class="ac-badge ${isAdmin ? 'ac-badge-gold' : 'ac-badge-moss'}">${roleLabel}</span>
          ${scopeBtn}
          ${editBtn}
        </div>`;
    }).join('');
    if (admin.canManageStaff) {
      listEl.querySelectorAll('[data-action="edit-teacher"]').forEach(btn => {
        btn.addEventListener('click', () => openEditTeacherModal(btn.dataset.userId, btn.dataset.name, btn.dataset.role));
      });
    }
    if (admin.isPlatformAdmin) {
      listEl.querySelectorAll('[data-action="edit-scope"]').forEach(btn => {
        btn.addEventListener('click', () => openScopeModal(btn.dataset.userId, btn.dataset.name));
      });
    }
  }

  async function refreshSchoolPicker(selectId) {
    schools = await AC.getAccessibleSchools(sb, admin);
    if (!schools.length) {
      document.getElementById('picker-bar').style.display = 'none';
      listEl.innerHTML = '<p class="ac-calm-msg">学校が見つかりません。</p>';
      btnAddTeacher.disabled = true;
      return;
    }
    pickerSchool.innerHTML = schools.map(s => `<option value="${s.id}">${H.escapeHtml(s.name)}</option>`).join('');
    const target = schools.find(s => s.id === selectId) || schools[0];
    pickerSchool.value = target.id;
    currentSchoolName = target.name;
    btnAddTeacher.disabled = false;
    await loadTeachers(target.id);
  }
  pickerSchool.addEventListener('change', async () => {
    currentSchoolName = schools.find(s => s.id === pickerSchool.value)?.name || '';
    await loadTeachers(pickerSchool.value);
  });

  // ── create teacher / admin (top-tier only — mirrors provision-account's
  //    own server-side authorization, this is just the honest UI reflection
  //    of it, not the actual security boundary) ─────────────────────────
  if (admin.canManageStaff) {
    btnAddTeacher.style.display = '';
  }
  btnAddTeacher.addEventListener('click', () => {
    document.getElementById('form-add-teacher').reset();
    document.getElementById('add-teacher-err').style.display = 'none';
    document.getElementById('add-teacher-school-name').textContent = currentSchoolName;
    document.getElementById('modal-add-teacher').style.display = 'flex';
    document.getElementById('input-teacher-email').focus();
  });
  document.getElementById('btn-cancel-add-teacher').addEventListener('click', () => {
    document.getElementById('modal-add-teacher').style.display = 'none';
  });
  document.getElementById('form-add-teacher').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('input-teacher-email').value.trim();
    const displayName = document.getElementById('input-teacher-name').value.trim();
    const kind = document.getElementById('select-teacher-role').value; // 'teacher' | 'admin' | 'coordinator'
    const errEl = document.getElementById('add-teacher-err');
    const submitBtn = document.getElementById('btn-submit-add-teacher');
    errEl.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = '作成中…';

    try {
      const res = await fetch(`${cfg.supabaseUrl}/functions/v1/provision-account`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({
          kind,
          school_id: pickerSchool.value,
          email,
          display_name: displayName,
        }),
      });
      const body = await res.json();
      if (!res.ok || !body.ok) {
        errEl.textContent = body.error || '作成できませんでした。';
        errEl.style.display = 'block';
        return;
      }
      document.getElementById('modal-add-teacher').style.display = 'none';
      document.getElementById('reveal-school').textContent = currentSchoolName || '—';
      document.getElementById('reveal-email').textContent = body.login || email;
      document.getElementById('reveal-password').textContent = body.initial_password || '—';
      document.getElementById('modal-password').style.display = 'flex';
      await loadTeachers(pickerSchool.value);
    } catch (err) {
      errEl.textContent = 'ネットワークエラーが発生しました。もう一度お試しください。';
      errEl.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '作成する';
    }
  });

  // ── edit teacher / admin (top-tier only) ────────────────────────────
  // Name/password go through the update-teacher Edge Function (needs
  // service_role for the auth password write). Role change and removal are
  // plain school_members writes the anon-key client can do under
  // members_admin_write RLS, so they don't need an Edge Function — the
  // policy already confines them to schools where the caller is school_admin
  // (or every school, for a platform admin), and the role CHECK constraint
  // confines the value to the four staff/student roles. Neither path can
  // reach profiles.is_platform_admin (a separate, client-locked column).
  let editingStaffId = null;
  let editingStaffRole = null;
  function openEditTeacherModal(staffUserId, name, role) {
    editingStaffId = staffUserId;
    editingStaffRole = (role === 'school_admin' || role === 'coordinator') ? role : 'educator';
    document.getElementById('edit-teacher-err').style.display = 'none';
    document.getElementById('edit-teacher-name').value = name || '';
    document.getElementById('edit-teacher-password').value = '';
    document.getElementById('edit-teacher-role').value = editingStaffRole;
    // Self-lockout guard: you can rename/re-password your own account but
    // cannot change your own role or remove yourself from the school you are
    // currently administering (would strip your own access mid-session).
    const isSelf = staffUserId === userId;
    document.getElementById('edit-teacher-role-field').style.display = isSelf ? 'none' : '';
    document.getElementById('edit-teacher-danger').style.display = isSelf ? 'none' : '';
    document.getElementById('modal-edit-teacher').style.display = 'flex';
  }
  document.getElementById('btn-cancel-edit-teacher').addEventListener('click', () => {
    document.getElementById('modal-edit-teacher').style.display = 'none';
    editingStaffId = null;
  });
  document.getElementById('form-edit-teacher').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!editingStaffId) return;
    const displayName = document.getElementById('edit-teacher-name').value.trim();
    const newPassword = document.getElementById('edit-teacher-password').value;
    const errEl = document.getElementById('edit-teacher-err');
    const submitBtn = document.getElementById('btn-submit-edit-teacher');
    errEl.style.display = 'none';

    if (newPassword && newPassword.trim().length > 0 && newPassword.trim().length < 8) {
      errEl.textContent = 'パスワードは8文字以上にしてください。';
      errEl.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '保存中…';
    try {
      const res = await fetch(`${cfg.supabaseUrl}/functions/v1/update-teacher`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({
          staff_id: editingStaffId,
          school_id: pickerSchool.value,
          display_name: displayName,
          password: newPassword && newPassword.trim().length > 0 ? newPassword.trim() : undefined,
        }),
      });
      const body = await res.json();
      if (!res.ok || !body.ok) {
        errEl.textContent = body.error || '保存できませんでした。';
        errEl.style.display = 'block';
        return;
      }
      // Role change (only for other people's rows — the field is hidden for a
      // self-edit). Written straight to school_members; RLS is the boundary.
      const newRole = document.getElementById('edit-teacher-role').value;
      if (editingStaffId !== userId && newRole !== editingStaffRole) {
        const { error: roleErr } = await sb.from('school_members')
          .update({ role: newRole })
          .eq('school_id', pickerSchool.value)
          .eq('user_id', editingStaffId);
        if (roleErr) {
          errEl.textContent = '役割を変更できませんでした。';
          errEl.style.display = 'block';
          return;
        }
      }
      document.getElementById('modal-edit-teacher').style.display = 'none';
      editingStaffId = null;
      await loadTeachers(pickerSchool.value);
    } catch (err) {
      errEl.textContent = 'ネットワークエラーが発生しました。もう一度お試しください。';
      errEl.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '保存する';
    }
  });

  // ── remove staff member from this school (#9) ───────────────────────
  // Deletes the (school, user, staff-role) school_members row via the
  // anon-key client. members_admin_write (FOR ALL) permits DELETE for a
  // school_admin of this school or a platform admin, and confines it to that
  // school — a coordinator (canManageStaff=false) never sees the edit button
  // that reaches here, and cross-tenant deletes fail the policy's USING. The
  // auth account + profile are intentionally preserved (re-addable later),
  // exactly like remove-student removes an enrollment, not the account.
  document.getElementById('btn-remove-teacher').addEventListener('click', async () => {
    if (!editingStaffId || editingStaffId === userId) return;
    const nm = document.getElementById('edit-teacher-name').value.trim() || 'この教員';
    if (!window.confirm(`${nm}を「${currentSchoolName}」の教員から外しますか？\nログインアカウント自体は削除されません。`)) return;
    const errEl = document.getElementById('edit-teacher-err');
    errEl.style.display = 'none';
    const btn = document.getElementById('btn-remove-teacher');
    btn.disabled = true;
    btn.textContent = '削除中…';
    try {
      const { error } = await sb.from('school_members')
        .delete().eq('school_id', pickerSchool.value).eq('user_id', editingStaffId);
      if (error) throw error;
      // Best-effort: also drop this member's class_teacher assignments in
      // this school so a removed educator's gradebook scope doesn't linger.
      // Tolerate failure — the membership removal above is authoritative.
      const { data: schoolClasses } = await sb.from('classes').select('id').eq('school_id', pickerSchool.value);
      const classIds = (schoolClasses || []).map(c => c.id);
      if (classIds.length) {
        await sb.from('class_teachers').delete().eq('user_id', editingStaffId).in('class_id', classIds).then(() => {}, () => {});
      }
      document.getElementById('modal-edit-teacher').style.display = 'none';
      editingStaffId = null;
      await loadTeachers(pickerSchool.value);
    } catch (e) {
      errEl.textContent = '削除できませんでした。';
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'この学校の教員から外す';
    }
  });

  // ── soft-disable / re-enable (Gap #2b) ──────────────────────────────
  // Bans or unbans the target's login via the set-staff-active Edge
  // Function (needs service_role for the GoTrue ban write). The function
  // re-authorizes server-side (platform admin OR school_admin of this
  // school — NOT coordinator), refuses self-disable and refuses disabling
  // a platform admin, so this button is only the honest UI reflection of
  // that boundary, not the boundary itself. Hidden for a self-edit.
  async function setStaffActive(active) {
    if (!editingStaffId || editingStaffId === userId) return;
    const nm = document.getElementById('edit-teacher-name').value.trim() || 'この教員';
    const verb = active ? '利用を再開' : '利用を停止';
    if (!window.confirm(`${nm}の${verb}しますか？`)) return;
    const errEl = document.getElementById('edit-teacher-err');
    errEl.style.display = 'none';
    const disBtn = document.getElementById('btn-disable-teacher');
    const enBtn = document.getElementById('btn-enable-teacher');
    disBtn.disabled = true; enBtn.disabled = true;
    try {
      const res = await fetch(`${cfg.supabaseUrl}/functions/v1/set-staff-active`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({
          staff_id: editingStaffId,
          school_id: pickerSchool.value,
          active,
        }),
      });
      const body = await res.json();
      if (!res.ok || !body.ok) {
        errEl.textContent = body.error || (active ? '利用を再開できませんでした。' : '利用を停止できませんでした。');
        errEl.style.display = 'block';
        return;
      }
      document.getElementById('modal-edit-teacher').style.display = 'none';
      editingStaffId = null;
      await loadTeachers(pickerSchool.value);
    } catch (err) {
      errEl.textContent = 'ネットワークエラーが発生しました。もう一度お試しください。';
      errEl.style.display = 'block';
    } finally {
      disBtn.disabled = false; enBtn.disabled = false;
    }
  }
  document.getElementById('btn-disable-teacher').addEventListener('click', () => setStaffActive(false));
  document.getElementById('btn-enable-teacher').addEventListener('click', () => setStaffActive(true));

  // ── coordinator scope (#114, platform-admin only) ───────────────────
  // Which schools a coordinator has authority over is just the set of
  // (school, this user, role='coordinator') rows in school_members —
  // no new edge function needed, the RLS policy members_admin_write
  // already lets a platform admin insert/delete any school's rows via
  // the anon-key client. Mirrors class-detail.html's teacher-assignment
  // checklist (openTeacherAssignModal / btn-submit-teachers) — same
  // checked-set diff, same insert-toAdd/delete-toRemove shape, same
  // optimistic-disable-button-while-saving convention.
  let scopingUserId = null;
  async function openScopeModal(targetUserId, name) {
    scopingUserId = targetUserId;
    document.getElementById('scope-modal-err').style.display = 'none';
    document.getElementById('scope-modal-name').textContent = name || '';
    const listEl2 = document.getElementById('scope-checklist');
    listEl2.innerHTML = '<div class="ac-skel" style="height:20px;"></div>';
    document.getElementById('modal-scope').style.display = 'flex';

    const [schoolsRes, currentRes] = await Promise.all([
      sb.from('schools').select('id, name').order('name'),
      sb.from('school_members').select('school_id').eq('user_id', targetUserId).eq('role', 'coordinator'),
    ]);
    if (schoolsRes.error || currentRes.error) {
      listEl2.innerHTML = '<p class="ac-calm-msg">読み込めませんでした</p>';
      return;
    }
    const allSchools = schoolsRes.data || [];
    const assignedIds = new Set((currentRes.data || []).map(r => r.school_id));
    listEl2.innerHTML = allSchools.map(s => `
      <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;">
        <input type="checkbox" value="${s.id}" ${assignedIds.has(s.id) ? 'checked' : ''}>
        ${H.escapeHtml(s.name)}
      </label>`).join('') || '<p class="ac-calm-msg">学校が見つかりません。</p>';
    // stash the pre-toggle assignment so the submit handler can diff
    // against it without a second round trip
    listEl2.dataset.initial = JSON.stringify([...assignedIds]);
  }
  document.getElementById('btn-cancel-scope').addEventListener('click', () => {
    document.getElementById('modal-scope').style.display = 'none';
    scopingUserId = null;
  });
  document.getElementById('btn-submit-scope').addEventListener('click', async () => {
    if (!scopingUserId) return;
    const errEl = document.getElementById('scope-modal-err');
    const submitBtn = document.getElementById('btn-submit-scope');
    const listEl2 = document.getElementById('scope-checklist');
    errEl.style.display = 'none';

    const checked = new Set(
      Array.from(listEl2.querySelectorAll('input:checked')).map(el => el.value)
    );
    let currentlyAssigned;
    try {
      currentlyAssigned = new Set(JSON.parse(listEl2.dataset.initial || '[]'));
    } catch {
      currentlyAssigned = new Set();
    }
    const toAdd = [...checked].filter(id => !currentlyAssigned.has(id));
    const toRemove = [...currentlyAssigned].filter(id => !checked.has(id));

    submitBtn.disabled = true;
    submitBtn.textContent = '保存中…';
    try {
      if (toAdd.length) {
        const { error } = await sb.from('school_members')
          .insert(toAdd.map(school_id => ({ school_id, user_id: scopingUserId, role: 'coordinator' })));
        if (error) throw error;
      }
      if (toRemove.length) {
        const { error } = await sb.from('school_members')
          .delete().eq('user_id', scopingUserId).eq('role', 'coordinator').in('school_id', toRemove);
        if (error) throw error;
      }
      document.getElementById('modal-scope').style.display = 'none';
      scopingUserId = null;
      // The coordinator's row in the CURRENTLY viewed school's list may
      // have just been added or removed — refresh it so the roster
      // reflects that immediately, same as the teacher-assignment
      // checklist does on class-detail.html.
      await loadTeachers(pickerSchool.value);
    } catch (err) {
      errEl.textContent = '保存できませんでした。';
      errEl.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '保存する';
    }
  });

  // Same discipline as class-detail.html's password reveal: no backdrop-
  // click-to-close, cleared from the DOM on explicit dismissal only.
  document.getElementById('btn-close-reveal').addEventListener('click', () => {
    document.getElementById('reveal-password').textContent = '';
    document.getElementById('modal-password').style.display = 'none';
  });
  document.getElementById('btn-print-reveal').addEventListener('click', () => window.print());

  await refreshSchoolPicker(null);
})();
</script>
</body>
</html>
