<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1C2530">
<meta name="description" content="Let's Try 1 — 小学3年生英語学習コンパニオン">
<title>Let's Try 1 — がくえん座</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
.module-topbar { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: #1C2530; border-bottom: none; }
.module-back { font-size: 13px; font-weight: 600; color: #C9CFD8; text-decoration: none; white-space: nowrap; }
.module-back:hover { color: #F7F3EA; }
.module-name { font-size: 13px; color: #7A8294; }

.module-account { position: relative; }
.module-account-btn { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px 5px 6px; border-radius: 999px; border: 1px solid #d8d2c2; background: #fff; cursor: pointer; font-family: inherit; transition: border-color .15s, background .15s; }
.module-account-btn:hover { background: #f7f3ea; border-color: #8a8570; }
.module-account-avatar { width: 26px; height: 26px; border-radius: 50%; background: #e8ede6; color: #34503a; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.module-account-name { font-size: 13px; font-weight: 600; color: #1c2530; white-space: nowrap; }
.module-account-menu { position: absolute; top: calc(100% + 6px); right: 0; background: #fff; border: 1px solid #d8d2c2; border-radius: 10px; box-shadow: 0 4px 16px rgba(28,37,48,.12); min-width: 140px; overflow: hidden; z-index: 50; }
.module-account-menu.hidden { display: none; }
.module-account-signout { display: block; width: 100%; padding: 10px 14px; background: none; border: none; text-align: left; font-size: 13px; font-family: inherit; color: #a23b2e; cursor: pointer; }
.module-account-signout:hover { background: #fdecea; }

:root {
  --bg: #F7F3EA; --surface: #FFFFFF; --surface2: #EFE9DB; --border: #E4E0D4;
  --text: #1C2530; --text2: #3A4555; --text3: #7A8294; --shadow: rgba(28,37,48,.08);
  --accent: #4A6B4F; --accent2: #EFE9DB;
  --gold: #C9A24B; --gold-deep: #A8843A;
}
body.dark {
  --bg: #1C1A16; --surface: #2A2620; --surface2: #332F27; --border: #4A453A;
  --text: #F2EDE0; --text2: #C9C2AC; --text3: #8F8874; --shadow: rgba(0,0,0,.3);
  --accent2: #332F27;
}
html, body { height: 100%; }
body { font-family: 'Noto Sans JP', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }
.main-col { padding: 14px 14px 60px; max-width: 640px; margin: 0 auto; }

/* ── Signature motifs ── */
.eyebrow { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: .09em; color: var(--gold-deep, #A8843A); text-transform: uppercase; }
.dot-rule { border-bottom: 2px dotted var(--gold); margin: 12px 0 16px; }

/* ── Header ── */
.header { text-align: center; padding: 18px 0 12px; }
.header-icon { display: inline-block; color: #fff; border-radius: 10px; padding: 7px 18px; font-size: 20px; font-weight: 700; letter-spacing: 2px; margin-bottom: 6px; background: #4A6B4F; font-family: 'Zen Maru Gothic', sans-serif; }
.header h1 { font-size: 23px; font-weight: 700; margin: 5px 0 0; font-family: 'Zen Maru Gothic', sans-serif; }
.header p { font-size: 13px; color: var(--text3); margin: 3px 0 0; }
.top-controls { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 12px; }
.top-controls-right { display: flex; gap: 8px; align-items: center; }
.theme-btn { padding: 8px 11px; border-radius: 8px; border: 2px solid var(--border); background: var(--surface); cursor: pointer; font-size: 16px; color: var(--text2); transition: all .15s; }
.theme-btn:hover { border-color: var(--text2); }
.auth-btn { padding: 7px 14px; border-radius: 8px; border: 2px solid #4A6B4F; background: transparent; cursor: pointer; font-size: 13px; font-weight: 600; color: #4A6B4F; transition: all .15s; font-family: inherit; }
.auth-btn:hover { background: var(--accent2); }
.auth-btn.logged-in { background: #4A6B4F; color: #fff; border-color: #4A6B4F; }

/* ── Unit tabs ── */
.unit-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
.unit-tab {
  flex: 1; min-width: 56px; padding: 8px 4px; text-align: center;
  border: 2px solid var(--border); border-radius: 8px; background: var(--surface);
  cursor: pointer; font-weight: 700; font-size: 12px; color: var(--text2);
  transition: all .15s; font-family: 'Zen Maru Gothic', sans-serif;
}
.unit-tab.active { color: #fff; border-color: transparent; background: #4A6B4F; }
.unit-tab:hover:not(.active) { border-color: var(--gold); }

/* ── Unit banner ── */
.unit-banner {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 14px 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(28,37,48,.08), 0 8px 24px rgba(28,37,48,.10);
  border-left: 4px solid;
}
.unit-banner h2 { font-size: 16px; font-weight: 700; margin-bottom: 3px; font-family: 'Zen Maru Gothic', sans-serif; }
.unit-banner p { font-size: 13px; color: var(--text2); }

/* ── Activity grid ── */
.act-grid { display: flex; flex-direction: column; gap: 9px; }
.act-card {
  display: flex; align-items: center; gap: 12px; padding: 13px 15px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  cursor: pointer; text-align: left; box-shadow: 0 2px 8px rgba(28,37,48,.08), 0 8px 24px rgba(28,37,48,.10);
  transition: box-shadow .15s, transform .1s, border-color .15s; font-family: inherit; color: var(--text); width: 100%;
}
.act-card:hover { box-shadow: 0 4px 16px rgba(28,37,48,.18); transform: translateY(-2px); border-color: var(--gold); }
.act-icon { font-size: 26px; flex-shrink: 0; }
.act-label { font-size: 15px; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; }
.act-desc { font-size: 12px; color: var(--text3); margin-top: 2px; }
.act-badge { margin-left: auto; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 12px; flex-shrink: 0; }

/* ── Section label ── */
.section-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin: 18px 0 8px; font-family: 'Zen Maru Gothic', sans-serif; }

/* ── Stats ── */
.stats-row { display: flex; gap: 10px; margin-bottom: 14px; }
.stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 12px; text-align: center; box-shadow: 0 2px 8px rgba(28,37,48,.08), 0 8px 24px rgba(28,37,48,.10); }
.stat-num { font-size: 24px; font-weight: 800; color: #4A6B4F; font-family: 'Zen Maru Gothic', sans-serif; }
.stat-lbl { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* ── Generic top bar ── */
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.back-btn {
  display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px;
  background: none; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer;
  font-family: inherit; transition: all .15s;
}
.back-btn:hover { border-color: #B5572E; color: #B5572E; background: #F7E8E1; }
.progress-text { font-size: 13px; color: var(--text3); }

/* ── Progress bar ── */
.progress-wrap { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.progress-bar { height: 100%; border-radius: 3px; transition: width .3s; background: #4A6B4F; }

/* ── Question card ── */
.q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(28,37,48,.08), 0 8px 24px rgba(28,37,48,.10); }
.q-badge { display: inline-block; font-size: 11px; font-weight: 700; border-radius: 6px; padding: 3px 10px; margin-bottom: 8px; background: #FBF3E1; color: #A8843A; font-family: 'Zen Maru Gothic', sans-serif; }
body.dark .q-badge { background: #2E2600; color: #E8C976; }
.q-text { font-size: 18px; line-height: 1.65; color: var(--text); font-weight: 600; font-family: 'Zen Maru Gothic', sans-serif; }
.q-sub { font-size: 14px; color: var(--text2); margin-top: 6px; line-height: 1.5; }

/* ── Options ── */
.opts { display: flex; flex-direction: column; gap: 8px; }
.opt-btn {
  display: flex; align-items: center; gap: 10px; padding: 12px 14px;
  border-radius: 10px; border: 2px solid var(--border); cursor: pointer;
  font-size: 15px; font-weight: 500; text-align: left; background: var(--surface);
  transition: all .15s; font-family: inherit; color: var(--text);
}
.opt-btn:hover:not(.locked) { border-color: var(--gold); background: var(--surface2); }
.opt-letter {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 7px; background: var(--surface2);
  font-weight: 700; font-size: 13px; flex-shrink: 0; font-family: 'Zen Maru Gothic', sans-serif;
}
.opt-btn.correct { background: #E8EDE6; border-color: #4A6B4F; color: #34503A; }
.opt-btn.wrong { background: #F7E8E1; border-color: #B5572E; color: #96471F; }
body.dark .opt-btn.correct { background: #24302A; color: #8FBE95; }
body.dark .opt-btn.wrong { background: #2F241E; color: #D68C6A; }
.opt-btn.locked { cursor: default; }

/* ── Feedback ── */
.feedback-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 8px; }
.fb-text { font-size: 18px; }
.next-btn {
  padding: 10px 22px; color: #fff; border: none; border-radius: 8px;
  font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Zen Maru Gothic', sans-serif;
  background: #4A6B4F; transition: background .15s;
}
.next-btn:hover { background: #34503A; }

/* ── Hint box ── */
.hint-box { background: #FBF3E1; border: 1px solid var(--gold); border-radius: 10px; padding: 11px 13px; margin-top: 10px; font-size: 14px; line-height: 1.6; color: #A8843A; }
body.dark .hint-box { background: #2E2600; border-color: #7C6C00; color: #E8C976; }

/* ── Score circle ── */
.review-header { text-align: center; padding: 20px 0 10px; }
.score-circle { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; width: 120px; height: 120px; border-radius: 50%; border: 5px solid #4A6B4F; margin-bottom: 10px; }
.score-pct { font-size: 31px; font-weight: 800; color: #4A6B4F; font-family: 'Zen Maru Gothic', sans-serif; }
.score-lbl { font-size: 13px; color: var(--text3); }
.grade-text { font-size: 20px; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; }

/* ── Result detail ── */
.result-list { display: flex; flex-direction: column; gap: 8px; margin: 14px 0; }
.result-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.result-q { font-size: 13px; font-weight: 600; color: var(--text2); }
.result-ans { font-size: 14px; margin-top: 3px; }

/* ── Matching activity ── */
.match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.match-col { display: flex; flex-direction: column; gap: 8px; }
.match-item {
  padding: 10px 12px; border-radius: 10px; border: 2px solid var(--border);
  background: var(--surface); cursor: pointer; font-size: 15px; font-weight: 600;
  text-align: center; transition: all .15s; font-family: inherit; color: var(--text);
}
.match-item:hover:not(.matched):not(.locked) { border-color: var(--gold); background: var(--surface2); }
.match-item.selected { border-color: #4A6B4F; background: #E8EDE6; color: #34503A; }
.match-item.matched { border-color: #4A6B4F; background: #E8EDE6; color: #34503A; cursor: default; }
.match-item.wrong-flash { border-color: #B5572E; background: #F7E8E1; }
body.dark .match-item.selected { background: #24302A; color: #8FBE95; }
body.dark .match-item.matched { background: #24302A; color: #8FBE95; }
body.dark .match-item.wrong-flash { background: #2F241E; }

/* ── Word Arrange ── */
.word-bank { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 44px; padding: 8px; background: var(--surface2); border-radius: 10px; }
.word-chip {
  padding: 8px 14px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--surface); cursor: pointer; font-size: 15px; font-weight: 600;
  transition: all .15s; font-family: inherit; color: var(--text);
}
.word-chip:hover { border-color: var(--gold); background: #E8EDE6; }
body.dark .word-chip:hover { background: #24302A; }
.word-chip.used { opacity: 0.3; cursor: default; pointer-events: none; }
.answer-row { display: flex; flex-wrap: wrap; gap: 8px; min-height: 44px; padding: 8px; background: var(--surface); border: 2px dashed var(--border); border-radius: 10px; margin-bottom: 10px; align-items: center; }
.answer-row[data-empty="true"]::before { content: "単語をタップして並べよう"; color: var(--text3); font-size: 14px; font-style: italic; }
.answer-chip {
  padding: 8px 14px; border-radius: 8px; border: 2px solid #4A6B4F;
  background: #E8EDE6; cursor: pointer; font-size: 15px; font-weight: 600;
  color: #34503A; font-family: inherit;
}
.answer-chip:hover { background: #D8E2D6; }
body.dark .answer-chip { background: #24302A; color: #8FBE95; }
body.dark .answer-chip:hover { background: #2C3A31; }

/* ── Primary / action btns ── */
.primary-btn {
  display: block; width: 100%; padding: 13px; background: #4A6B4F; color: #fff;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
  margin-top: 14px; font-family: 'Zen Maru Gothic', sans-serif; transition: background .15s;
}
.primary-btn:hover { background: #34503A; }
.primary-btn.pink { background: #B5572E; }
.primary-btn.pink:hover { background: #96471F; }
.check-btn {
  display: block; width: 100%; padding: 13px; background: #4A6B4F; color: #fff;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
  margin-top: 10px; font-family: 'Zen Maru Gothic', sans-serif; transition: background .15s;
}
.check-btn:hover { background: #34503A; }
.check-btn:disabled { background: var(--border); color: var(--text3); cursor: default; }

/* ── Flashcard ── */
.flashcard-wrap { perspective: 1000px; margin: 20px auto; max-width: 400px; }
.flashcard {
  width: 100%; height: 180px; position: relative; transform-style: preserve-3d;
  transition: transform .5s; cursor: pointer; border-radius: 16px;
}
.flashcard.flipped { transform: rotateY(180deg); }
.fc-face {
  position: absolute; inset: 0; border-radius: 16px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  backface-visibility: hidden; padding: 20px;
  border: 2px solid var(--border); box-shadow: 0 4px 16px var(--shadow);
}
.fc-front { background: var(--surface); }
.fc-back { background: #E8EDE6; transform: rotateY(180deg); }
body.dark .fc-back { background: #24302A; }
.fc-emoji { font-size: 42px; margin-bottom: 8px; }
.fc-word { font-size: 22px; font-weight: 800; color: var(--text); font-family: 'Zen Maru Gothic', sans-serif; }
.fc-hint { font-size: 13px; color: var(--text3); margin-top: 4px; }
.fc-translation { font-size: 20px; font-weight: 700; color: #4A6B4F; font-family: 'Zen Maru Gothic', sans-serif; }
body.dark .fc-translation { color: #8FBE95; }
.fc-nav { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 12px; }
.fc-nav-btn {
  padding: 8px 18px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--surface); cursor: pointer; font-size: 14px; font-weight: 600;
  font-family: inherit; color: var(--text2); transition: all .15s;
}
.fc-nav-btn:hover { border-color: #4A6B4F; color: #4A6B4F; }
.fc-counter { font-size: 14px; color: var(--text3); min-width: 60px; text-align: center; }

/* ── Result sync banner ── */
.sync-banner { background: #E8EDE6; border: 1px solid #4A6B4F; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #4A6B4F; margin-top: 12px; display: flex; align-items: center; gap: 8px; }
.sync-banner.error { background: #FBF3E1; border-color: var(--gold); color: #A8843A; }
body.dark .sync-banner { background: #24302A; border-color: #4A6B4F; color: #8FBE95; }
body.dark .sync-banner.error { background: #2E2600; border-color: #7C6C00; color: #E8C976; }

.hidden { display: none !important; }

/* ── Footer nav ── */
.footer-nav { text-align: center; color: var(--text3); font-size: 13px; margin-top: 20px; }
</style>
</head>
<body>
<div class="module-topbar">
  <a href="../../hub/index.html" class="module-back">← ホームへ</a>
  <span class="module-name">Let's Try 1</span>
  <div id="module-account-mount" style="margin-left:auto;"></div>
</div>

<div class="main-col" id="app">

  <!-- ══════════════════ HOME ══════════════════ -->
  <div id="home-screen">
    <div class="header">
      <div class="eyebrow">LET'S TRY</div>
      <div class="header-icon">Let's Try!</div>
      <h1>Let's Try 1 練習</h1>
      <div class="dot-rule" style="width:120px;margin-left:auto;margin-right:auto;"></div>
      <p>Unit 1–9 · 小学校3年生向け · 自主練習ツール</p>
    </div>

    <div class="top-controls">
      <div class="top-controls-right">
        <button class="theme-btn" id="theme-btn">🌙</button>
      </div>
    </div>

    <div class="unit-tabs" id="unit-tabs">
      <button class="unit-tab active" data-unit="0">全</button>
      <button class="unit-tab" data-unit="1">U1</button>
      <button class="unit-tab" data-unit="2">U2</button>
      <button class="unit-tab" data-unit="3">U3</button>
      <button class="unit-tab" data-unit="4">U4</button>
      <button class="unit-tab" data-unit="5">U5</button>
      <button class="unit-tab" data-unit="6">U6</button>
      <button class="unit-tab" data-unit="7">U7</button>
      <button class="unit-tab" data-unit="8">U8</button>
      <button class="unit-tab" data-unit="9">U9</button>
    </div>

    <div id="unit-banner" class="unit-banner hidden">
      <h2 id="banner-title"></h2>
      <p id="banner-sub"></p>
    </div>

    <p class="section-label">🎯 練習メニュー</p>
    <div class="act-grid" id="act-grid"></div>
  </div>

  <!-- ══════════════════ VOCAB QUIZ ══════════════════ -->
  <div id="quiz-screen" class="hidden">
    <div class="topbar">
      <button class="back-btn" id="quiz-back">← メニュー</button>
      <span class="progress-text" id="quiz-prog-text"></span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="quiz-prog-bar"></div></div>
    <div class="q-card">
      <span class="q-badge" id="quiz-badge"></span>
      <div class="q-text" id="quiz-q"></div>
      <div class="q-sub" id="quiz-sub"></div>
    </div>
    <div class="opts" id="quiz-opts"></div>
    <div class="hint-box hidden" id="quiz-hint"></div>
    <div class="feedback-row hidden" id="quiz-feedback">
      <span class="fb-text" id="quiz-fb-icon"></span>
      <button class="next-btn" id="quiz-next">次へ →</button>
    </div>
    <div style="text-align:center;font-size:13px;color:var(--text3);margin-top:14px;padding-top:10px;border-top:1px solid var(--border)" id="quiz-run-score"></div>
  </div>

  <!-- ══════════════════ FLASHCARDS ══════════════════ -->
  <div id="flash-screen" class="hidden">
    <div class="topbar">
      <button class="back-btn" id="flash-back">← メニュー</button>
      <span class="progress-text" id="flash-prog"></span>
    </div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard">
        <div class="fc-face fc-front">
          <div class="fc-emoji" id="fc-emoji"></div>
          <div class="fc-word" id="fc-word"></div>
          <div class="fc-hint">タップして日本語を見る</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-word" id="fc-word-back"></div>
          <div class="fc-translation" id="fc-trans"></div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fc-nav-btn" id="fc-prev">← 前</button>
      <span class="fc-counter" id="fc-counter"></span>
      <button class="fc-nav-btn" id="fc-next">次 →</button>
    </div>
    <button class="primary-btn pink" id="fc-shuffle" style="margin-top:16px">🔀 シャッフル</button>
  </div>

  <!-- ══════════════════ MATCHING ══════════════════ -->
  <div id="match-screen" class="hidden">
    <div class="topbar">
      <button class="back-btn" id="match-back">← メニュー</button>

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let currentUnit = 0;
let currentActivity = null;
let currentUnitData = null;

let qItems = [], qIdx = 0, qScore = 0, qResults = [];
let fcItems = [], fcIdx = 0;
let matchSelected = null, matchScore = 0, matchTotal = 0;
let buildItems = [], buildIdx = 0, buildScore = 0;
let buildAnswer = [], buildBank = [];

// ══════════════════════════════════════════════════════════
// SCREENS
// ══════════════════════════════════════════════════════════
const screens = ["home-screen","quiz-screen","flash-screen","match-screen","build-screen","review-screen"];
function showScreen(id) {
  screens.forEach(s => document.getElementById(s).classList.toggle("hidden", s !== id));
}

// ══════════════════════════════════════════════════════════
// RESULT SYNC (Gakuenza)
// ══════════════════════════════════════════════════════════
// Gakuenza's hub already gates module access on an active session (see
// letstry1-report.js), so there is no logged-out state to handle here —
// unlike the original app's currentUser-gated flow.
async function saveResultToSupabase(actType, unitId, score, total, items) {
  if (!window.hk) return null;
  try {
    // Use the shared platform hk.syncQuizResult — same table/schema as EikenApp + NH6
    await window.hk.syncQuizResult({
      app_id: 'letstry1',
      level: 'unit' + unitId,
      setId: 'unit' + unitId,
      category: actType,
      correct: score,
      total: total,
      items: items || []
    });
    return true;
  } catch(e) {
    console.warn("[LT1] Supabase save failed:", e.message);
    return false;
  }
}

// ══════════════════════════════════════════════════════════
// HOME SCREEN
// ══════════════════════════════════════════════════════════
document.getElementById("unit-tabs").addEventListener("click", e => {
  const tab = e.target.closest(".unit-tab");
  if (!tab) return;
  currentUnit = parseInt(tab.dataset.unit);
  document.querySelectorAll(".unit-tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  renderHome();
});

function getUnitsToShow() {
  if (currentUnit === 0) return UNITS.filter(Boolean);
  return [UNITS[currentUnit]].filter(Boolean);
}

function renderHome() {
  const units = getUnitsToShow();
  const banner = document.getElementById("unit-banner");
  if (currentUnit !== 0 && units.length) {
    const u = units[0];
    banner.classList.remove("hidden");
    banner.style.borderColor = u.color;
    document.getElementById("banner-title").textContent = `Unit ${u.id}: ${u.title}`;
    document.getElementById("banner-title").style.color = u.color;
    document.getElementById("banner-sub").textContent = u.titleJp;
  } else {
    banner.classList.add("hidden");
  }

  const grid = document.getElementById("act-grid");
  grid.innerHTML = "";

  if (currentUnit === 0) {
    Object.entries(ACTIVITY_DEFS).forEach(([key, def]) => {
      const unitCount = UNITS.filter(Boolean).filter(u => u.activities.includes(key)).length;
      const btn = document.createElement("button");
      btn.className = "act-card";
      btn.innerHTML = `<span class="act-icon">${def.icon}</span><div><div class="act-label">${def.label}</div><div class="act-desc">${def.desc}</div></div><span class="act-badge" style="background:var(--accent2);color:#4A6B4F">${unitCount} Units</span>`;
      btn.addEventListener("click", () => launchActivity(key, null));
      grid.appendChild(btn);
    });
  } else {
    const u = units[0];
    u.activities.forEach(key => {
      const def = ACTIVITY_DEFS[key];
      const count = key === "build" ? u.sentences.length : key === "match" ? u.matchPairs.length : u.vocab.length;
      const btn = document.createElement("button");
      btn.className = "act-card";
      btn.innerHTML = `<span class="act-icon">${def.icon}</span><div><div class="act-label">${def.label}</div><div class="act-desc">${def.desc}</div></div><span class="act-badge" style="background:var(--accent2);color:#4A6B4F">${count}問</span>`;
      btn.addEventListener("click", () => launchActivity(key, u));
      grid.appendChild(btn);
    });
  }
}

function launchActivity(type, unitData) {
  currentActivity = type;
  currentUnitData = unitData;
  if (type === "vocab")  startQuiz(unitData);
  if (type === "flash")  startFlash(unitData);
  if (type === "match")  startMatch(unitData);
  if (type === "build")  startBuild(unitData);
}

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ══════════════════════════════════════════════════════════
// VOCAB QUIZ
// ══════════════════════════════════════════════════════════
function buildQuizItems(unitData) {
  const allVocab = unitData
    ? unitData.vocab.map(v => ({...v, unit: unitData.id, unitTitle: unitData.title, unitColor: unitData.color}))
    : UNITS.filter(Boolean).flatMap(u => u.vocab.map(v => ({...v, unit: u.id, unitTitle: u.title, unitColor: u.color})));
  return shuffle(allVocab).slice(0, Math.min(15, allVocab.length)).map(item => {
    const pool = UNITS.filter(Boolean).flatMap(u => u.vocab).filter(v => v.jp !== item.jp);
    const distractors = shuffle(pool).slice(0, 3).map(v => v.jp);
    const choices = shuffle([item.jp, ...distractors]);
    return { ...item, choices, correct: item.jp };
  });
}

function startQuiz(unitData) {
  qItems = buildQuizItems(unitData);
  qIdx = 0; qScore = 0; qResults = [];
  renderQuizQ();
  showScreen("quiz-screen");
}

function renderQuizQ() {
  const item = qItems[qIdx];
  const total = qItems.length;
  document.getElementById("quiz-badge").textContent = `Unit ${item.unit} · ${item.unitTitle}`;
  document.getElementById("quiz-badge").style.background = item.unitColor + "22";
  document.getElementById("quiz-badge").style.color = item.unitColor;
  document.getElementById("quiz-q").textContent = `${item.emoji} ${item.en}`;
  document.getElementById("quiz-sub").textContent = item.hint;
  document.getElementById("quiz-prog-text").textContent = `${qIdx + 1} / ${total}`;
  document.getElementById("quiz-prog-bar").style.width = `${(qIdx / total) * 100}%`;
  document.getElementById("quiz-hint").classList.add("hidden");
  document.getElementById("quiz-feedback").classList.add("hidden");
  document.getElementById("quiz-run-score").textContent = `現在の成績: ${qScore} / ${qIdx}`;
  const opts = document.getElementById("quiz-opts");
  opts.innerHTML = "";
  ["A","B","C","D"].forEach((letter, i) => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.innerHTML = `<span class="opt-letter">${letter}</span> ${item.choices[i]}`;
    btn.addEventListener("click", () => chooseQuizOpt(btn, item.choices[i], item));
    opts.appendChild(btn);
  });
}

function chooseQuizOpt(btn, choice, item) {
  const correct = choice === item.correct;
  document.querySelectorAll(".opt-btn").forEach(b => {
    b.classList.add("locked");
    if (b.textContent.trim().slice(1).trim() === item.correct) b.classList.add("correct");
  });
  if (!correct) btn.classList.add("wrong");
  if (correct) qScore++;
  qResults.push({ item, correct, chosen: choice });
  document.getElementById("quiz-hint").textContent = `💡 ${item.hint}`;
  document.getElementById("quiz-hint").classList.remove("hidden");
  document.getElementById("quiz-fb-icon").textContent = correct ? "⭕ 正解！" : "❌ 不正解";
  document.getElementById("quiz-feedback").classList.remove("hidden");
}

document.getElementById("quiz-next").addEventListener("click", () => {
  qIdx++;
  if (qIdx >= qItems.length) showReview("quiz");
  else renderQuizQ();
});
document.getElementById("quiz-back").addEventListener("click", () => showScreen("home-screen"));

// ══════════════════════════════════════════════════════════
// FLASHCARDS
// ══════════════════════════════════════════════════════════
function startFlash(unitData) {
  fcItems = unitData ? [...unitData.vocab] : shuffle(UNITS.filter(Boolean).flatMap(u => u.vocab));
  fcIdx = 0;
  renderFlash();
  showScreen("flash-screen");
}
function renderFlash() {
  const card = document.getElementById("flashcard");
  card.classList.remove("flipped");
  const item = fcItems[fcIdx];
  document.getElementById("fc-emoji").textContent = item.emoji;
  document.getElementById("fc-word").textContent = item.en;
  document.getElementById("fc-word-back").textContent = item.en;
  document.getElementById("fc-trans").textContent = item.jp;
  document.getElementById("fc-counter").textContent = `${fcIdx + 1} / ${fcItems.length}`;
  document.getElementById("flash-prog").textContent = `${fcIdx + 1} / ${fcItems.length}`;
}
document.getElementById("flashcard").addEventListener("click", () => document.getElementById("flashcard").classList.toggle("flipped"));
document.getElementById("fc-prev").addEventListener("click", () => { fcIdx = (fcIdx - 1 + fcItems.length) % fcItems.length; renderFlash(); });
document.getElementById("fc-next").addEventListener("click", () => { fcIdx = (fcIdx + 1) % fcItems.length; renderFlash(); });
document.getElementById("fc-shuffle").addEventListener("click", () => { fcItems = shuffle([...fcItems]); fcIdx = 0; renderFlash(); });
document.getElementById("flash-back").addEventListener("click", () => showScreen("home-screen"));

// ══════════════════════════════════════════════════════════
// MATCHING
// ══════════════════════════════════════════════════════════
function startMatch(unitData) {
  matchScore = 0; matchTotal = 0; matchSelected = null;
  const pairs = unitData ? unitData.matchPairs : UNITS.filter(Boolean).flatMap(u => u.matchPairs);
  const selectedPairs = shuffle(pairs).slice(0, 6);
  matchTotal = selectedPairs.length;
  renderMatchRound(selectedPairs);
  showScreen("match-screen");
}

function renderMatchRound(pairs) {
  matchSelected = null;
  const lefts = shuffle(pairs.map(p => p[0]));
  const rights = shuffle(pairs.map(p => p[1]));
  const pairMap = Object.fromEntries(pairs.map(p => [p[0], p[1]]));
  document.getElementById("match-instructions").textContent = "英語と日本語を結びつけよう！";
  document.getElementById("match-score-text").textContent = `${matchScore} / ${matchTotal}`;
  document.getElementById("match-result").classList.add("hidden");
  document.getElementById("match-next-round").classList.add("hidden");
  const leftCol = document.getElementById("match-left");
  const rightCol = document.getElementById("match-right");
  leftCol.innerHTML = ""; rightCol.innerHTML = "";
  let matched = 0;

  function makeItem(text, side) {
    const el = document.createElement("button");
    el.className = "match-item";
    el.textContent = text;
    el.dataset.side = side;
    el.dataset.val = text;
    el.addEventListener("click", () => {
      if (el.classList.contains("matched") || el.classList.contains("locked")) return;
      if (matchSelected && matchSelected.el === el) {
        el.classList.remove("selected");
        matchSelected = null;
        return;
      }
      if (matchSelected && matchSelected.side === side) {
        matchSelected.el.classList.remove("selected");
        matchSelected = { el, side, val: text };
        el.classList.add("selected");
        return;
      }
      if (!matchSelected) {
        matchSelected = { el, side, val: text };
        el.classList.add("selected");
      } else {
        // Check match
        const leftVal  = side === "L" ? text : matchSelected.val;
        const rightVal = side === "R" ? text : matchSelected.val;
        if (pairMap[leftVal] === rightVal) {
          el.classList.add("matched");
          matchSelected.el.classList.remove("selected");
          matchSelected.el.classList.add("matched");
          matched++;
          matchScore++;
          document.getElementById("match-score-text").textContent = `${matchScore} / ${matchTotal}`;
          if (matched === pairs.length) {
            document.getElementById("match-result").textContent = "🎉 全部正解！素晴らしい！";
            document.getElementById("match-result").classList.remove("hidden");
            document.getElementById("match-next-round").classList.remove("hidden");
          }
        } else {
          el.classList.add("wrong-flash");
          matchSelected.el.classList.add("wrong-flash");
          setTimeout(() => { el.classList.remove("wrong-flash"); matchSelected.el.classList.remove("selected","wrong-flash"); }, 600);
        }
        matchSelected = null;
      }
    });
    return el;
  }
  lefts.forEach(t => leftCol.appendChild(makeItem(t, "L")));
  rights.forEach(t => rightCol.appendChild(makeItem(t, "R")));
}

document.getElementById("match-next-round").addEventListener("click", () => {
  const pairs = currentUnitData ? currentUnitData.matchPairs : UNITS.filter(Boolean).flatMap(u => u.matchPairs);
  renderMatchRound(shuffle(pairs).slice(0, 6));
});
document.getElementById("match-back").addEventListener("click", () => showScreen("home-screen"));

// ══════════════════════════════════════════════════════════
// SENTENCE BUILD
// ══════════════════════════════════════════════════════════
function startBuild(unitData) {
  const allSentences = unitData
    ? unitData.sentences.map(s => ({...s, unit: unitData.id, unitColor: unitData.color}))
    : UNITS.filter(Boolean).flatMap(u => u.sentences.map(s => ({...s, unit: u.id, unitColor: u.color})));
  buildItems = shuffle(allSentences).slice(0, Math.min(8, allSentences.length));
  buildIdx = 0; buildScore = 0;
  renderBuildQ();
  showScreen("build-screen");
}

function renderBuildQ() {
  const item = buildItems[buildIdx];
  buildAnswer = [];
  buildBank = shuffle([...item.words]);
  document.getElementById("build-prog").textContent = `${buildIdx + 1} / ${buildItems.length}`;
  document.getElementById("build-prog-bar").style.width = `${(buildIdx / buildItems.length) * 100}%`;
  document.getElementById("build-prompt").textContent = "日本語を英語にしよう：";
  document.getElementById("build-jp").textContent = item.jp;
  document.getElementById("build-hint").classList.add("hidden");
  document.getElementById("build-feedback").classList.add("hidden");
  document.getElementById("build-check").disabled = true;
  renderBuildBank(item);
  renderBuildAnswer();
}

function renderBuildBank(item) {
  const bank = document.getElementById("build-bank");
  bank.innerHTML = "";
  buildBank.forEach((word, i) => {
    const chip = document.createElement("button");
    chip.className = "word-chip" + (buildAnswer.includes(i) ? " used" : "");
    chip.textContent = word;
    chip.addEventListener("click", () => {
      if (chip.classList.contains("used")) return;
      buildAnswer.push(i);
      chip.classList.add("used");
      renderBuildAnswer();
      document.getElementById("build-check").disabled = buildAnswer.length === 0;
    });
    bank.appendChild(chip);
  });
}

function renderBuildAnswer() {
  const row = document.getElementById("build-answer");
  row.innerHTML = "";
  if (buildAnswer.length === 0) { row.setAttribute("data-empty","true"); return; }
  row.setAttribute("data-empty","false");
  buildAnswer.forEach((bankIdx, pos) => {
    const chip = document.createElement("button");
    chip.className = "answer-chip";
    chip.textContent = buildBank[bankIdx];
    chip.addEventListener("click", () => {
      buildAnswer.splice(pos, 1);
      // Un-use in bank
      const bankChips = document.getElementById("build-bank").children;
      bankChips[bankIdx].classList.remove("used");
      renderBuildAnswer();
      document.getElementById("build-check").disabled = buildAnswer.length === 0;
    });
    row.appendChild(chip);
  });
}

document.getElementById("build-check").addEventListener("click", () => {
  const item = buildItems[buildIdx];
  const answer = buildAnswer.map(i => buildBank[i]).join(" ");
  const correct = answer.trim().toLowerCase() === item.words.join(" ").toLowerCase();
  if (correct) buildScore++;
  document.getElementById("build-hint").textContent = correct ? `✅ 正解！ "${item.words.join(" ")}"` : `❌ 正解は "${item.words.join(" ")}"`;
  document.getElementById("build-hint").style.background = correct ? "#E8EDE6" : "#F7E8E1";
  document.getElementById("build-hint").style.borderColor = correct ? "#4A6B4F" : "#B5572E";
  document.getElementById("build-hint").style.color = correct ? "#34503A" : "#96471F";
  document.getElementById("build-hint").classList.remove("hidden");
  document.getElementById("build-fb-icon").textContent = correct ? "⭕ 正解！" : "❌ もう一度";
  document.getElementById("build-feedback").classList.remove("hidden");
  document.getElementById("build-check").disabled = true;
});

document.getElementById("build-next").addEventListener("click", () => {
  buildIdx++;
  if (buildIdx >= buildItems.length) showReview("build");
  else renderBuildQ();
});
document.getElementById("build-back").addEventListener("click", () => showScreen("home-screen"));

// ══════════════════════════════════════════════════════════
// REVIEW SCREEN
// ══════════════════════════════════════════════════════════
async function showReview(type) {
  const score = type === "quiz" ? qScore : buildScore;
  const total = type === "quiz" ? qItems.length : buildItems.length;
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  const grade = pct >= 90 ? "🌟 すばらしい！" : pct >= 70 ? "👍 よくできました！" : pct >= 50 ? "😊 もう少し！" : "💪 練習しよう！";

  document.getElementById("rv-pct").textContent = pct + "%";
  document.getElementById("rv-grade").textContent = grade;
  document.getElementById("rv-correct").textContent = score;
  document.getElementById("rv-wrong").textContent = total - score;
  document.getElementById("rv-total").textContent = total;

  // Save to Supabase
  const syncDiv = document.getElementById("rv-sync");
  syncDiv.innerHTML = "";
  syncDiv.classList.remove("hidden");
  const unitId = currentUnitData ? currentUnitData.id : 0;
  // Per-question detail for activity_result_items. Only the quiz activity
  // tracks per-question outcomes (qResults); match/build record a summary
  // score only, so they report with no item breakdown.
  const items = type === "quiz"
    ? qResults.map((r, i) => ({
        itemRef: "unit" + unitId + "/quiz/" + i,
        category: "quiz",
        prompt: r.item.en,
        correct: !!r.correct,
        selectedAnswer: r.chosen,
        correctAnswer: r.item.jp,
      }))
    : [];
  const saved = await saveResultToSupabase(type, unitId, score, total, items);
  syncDiv.innerHTML = saved
    ? `<div class="sync-banner">☁️ 成績をクラウドに保存しました！</div>`
    : `<div class="sync-banner error">⚠️ 保存に失敗しました。後でもう一度お試しください。</div>`;

  // Result list (quiz only)
  const rvList = document.getElementById("rv-list");
  rvList.innerHTML = "";
  if (type === "quiz") {
    qResults.forEach((r, i) => {
      const div = document.createElement("div");
      div.className = "result-row";
      div.innerHTML = `<div class="result-q">${i+1}. ${r.item.emoji} ${r.item.en}</div>
        <div class="result-ans" style="color:${r.correct ? '#34503A' : '#B5572E'}">${r.correct ? "✅ " : "❌ "}${r.item.jp}${!r.correct ? ` (あなたの答え: ${r.chosen})` : ""}</div>`;
      rvList.appendChild(div);
    });
  }

  showScreen("review-screen");
}

document.getElementById("rv-retry").addEventListener("click", () => {
  if (currentActivity === "quiz")  startQuiz(currentUnitData);
  if (currentActivity === "build") startBuild(currentUnitData);
  if (currentActivity === "match") startMatch(currentUnitData);
});
document.getElementById("rv-menu").addEventListener("click", () => showScreen("home-screen"));

</script>
