<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1C2530">
  <meta name="description" content="Let's Try 2 — 小学4年生英語学習コンパニオン">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Let's Try 2">
  <title>Let's Try 2 — がくえん座</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Module topbar (back-to-hub link) + account bubble — same
       self-contained pattern as every other Gakuenza module. This module
       owns its complete styling instead of depending on anything outside
       its own folder (a shared root stylesheet's generic
       `button{width:100%}` rule once leaked onto every button on a module
       page — checked this file for that collision; none found, but each
       module still stays self-contained on purpose). ── */
    .module-topbar { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: #1C2530; border-bottom: none; }
    .module-back { font-size: 13px; font-weight: 600; color: #C9CFD8; text-decoration: none; white-space: nowrap; }
    .module-back:hover { color: #F7F3EA; }
    .module-name { font-size: 13px; color: #7A8294; }

    .module-account { position: relative; }
    .module-account-btn { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px 5px 6px; border-radius: 999px; border: 1px solid #d8d2c2; background: #fff; cursor: pointer; font-family: inherit; transition: border-color .15s, background .15s; }
    .module-account-btn:hover { background: #f7f3ea; border-color: #8a8570; }
    .module-account-avatar { width: 26px; height: 26px; border-radius: 50%; background: #e8ede6; color: #34503a; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .module-account-name { font-size: 13px; font-weight: 600; color: #1c2530; white-space: nowrap; }
    .module-account-menu { position: absolute; top: calc(100% + 6px); right: 0; background: #fff; border: 1px solid #d8d2c2; border-radius: 10px; box-shadow: 0 4px 16px rgba(28,37,48,.12); min-width: 140px; overflow: hidden; z-index: 50; }
    .module-account-menu.hidden { display: none; }
    .module-account-signout { display: block; width: 100%; padding: 10px 14px; background: none; border: none; text-align: left; font-size: 13px; font-family: inherit; color: #a23b2e; cursor: pointer; }
    .module-account-signout:hover { background: #fdecea; }

    .results-sync { text-align: center; font-size: 13px; font-weight: 600; color: #4A6B4F; margin: 4px 0 14px; min-height: 18px; }
    .results-sync.error { color: #A8843A; cursor: pointer; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F3EA; --surface: #FFFFFF; --surface2: #EFE9DB; --border: #E4E0D4;
      --text: #1C2530; --text2: #3A4555; --text3: #7A8294; --shadow: rgba(28,37,48,.08);
      --gold: #C9A24B; --gold-deep: #A8843A;
      --accent: #4A6B4F; --accent2: #EFE9DB;
    }
    body.dark {
      --bg: #1C1A16; --surface: #2A2620; --surface2: #332F27; --border: #4A453A;
      --text: #F2EDE0; --text2: #C9C2AC; --text3: #8F8874; --shadow: rgba(0,0,0,.3);
      --accent2: #332F27;
    }

    html, body { height: 100%; }
    body { font-family: 'Noto Sans JP', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }

    .main-col { padding: 14px 14px 60px; max-width: 640px; margin: 0 auto; }

    /* ── Signature motifs ── */
    .eyebrow { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: .09em; color: var(--gold-deep, #A8843A); text-transform: uppercase; }
    .dot-rule { border-bottom: 3px dotted var(--gold); width: 120px; margin: 12px auto 10px; }

    /* ── Home header ── */
    .lt-header { text-align: center; padding: 20px 0 4px; }
    .lt-title { font-size: 28px; font-weight: 700; margin: 8px 0 0; font-family: 'Zen Maru Gothic', sans-serif; color: var(--text); line-height: 1.3; }
    .lt-sub { font-size: 14px; color: var(--text3); margin: 4px 0 0; }

    /* ── Unit toolbar (all-units + theme) ── */
    .unit-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 12px 0 16px; }
    .theme-btn { padding: 8px 11px; border-radius: 8px; border: 2px solid var(--border); background: var(--surface); cursor: pointer; font-size: 16px; color: var(--text2); transition: all .15s; }
    .theme-btn:hover { border-color: var(--text2); }
    .all-units-btn {
      padding: 9px 18px; border-radius: 999px; border: 2px solid var(--border);
      background: var(--surface); cursor: pointer; font-weight: 700; font-size: 13px;
      color: var(--text2); font-family: 'Zen Maru Gothic', sans-serif; transition: all .15s;
    }
    .all-units-btn:hover { border-color: var(--gold); }
    .all-units-btn.active { background: #4A6B4F; border-color: transparent; color: #fff; }

    /* ── Unit cards grid ── */
    .unit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .unit-card {
      background: var(--surface); border: 1px solid var(--border);
      border-top: 6px solid var(--uc-accent, #4A6B4F); border-radius: 18px;
      padding: 18px; display: flex; flex-direction: column; gap: 7px; text-align: left;
      cursor: pointer; box-shadow: 0 2px 8px rgba(28,37,48,.08), 0 8px 24px rgba(28,37,48,.10);
      transition: transform .1s, box-shadow .15s; font-family: inherit; color: var(--text); width: 100%;
    }
    .unit-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(28,37,48,.18); }
    .unit-card.selected {
      border: 2px solid var(--gold); border-top: 6px solid var(--gold);
      box-shadow: 0 0 0 2px var(--gold), 0 2px 8px rgba(28,37,48,.08), 0 8px 24px rgba(28,37,48,.10);
    }
    .uc-num { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 13px; color: var(--text3); }
    .uc-title { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 18px; line-height: 1.25; color: var(--uc-accent, #4A6B4F); }
    .uc-sub { font-size: 12px; color: var(--text2); line-height: 1.4; }
    .uc-bar { height: 9px; background: var(--surface2); border-radius: 999px; overflow: hidden; margin-top: 6px; }
    .uc-fill { height: 100%; border-radius: 999px; background: var(--uc-accent, #4A6B4F); transition: width .3s; }
    .uc-count { font-family: 'Zen Maru Gothic', sans-serif; font-size: 12px; font-weight: 700; color: var(--uc-accent, #4A6B4F); }
    @media (max-width: 520px) { .unit-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }

    /* ── Mode picker panel ── */
    .mode-panel { background: var(--surface2); border-radius: 20px; padding: 20px 22px; border-left: 6px solid var(--gold); box-shadow: 0 2px 8px var(--shadow); }
    .mode-panel-title { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 18px; color: var(--gold-deep); line-height: 1.35; }
    .mode-panel-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
    .mode-btn {
      display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 22px 14px;
      background: var(--surface); border: none; border-radius: 18px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(28,37,48,.08), 0 8px 24px rgba(28,37,48,.10);
      font-family: inherit; color: var(--text); transition: transform .1s, box-shadow .15s;
    }
    .mode-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(28,37,48,.18); }
    .mode-emoji { font-size: 40px; line-height: 1; }
    .mode-label { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 16px; }
    .mode-desc { font-size: 12px; color: var(--text3); text-align: center; }

    /* ── Generic top bar ── */
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px; padding: 8px 14px;
      background: none; border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer;
      font-family: inherit; transition: all .15s;
    }
    .back-btn:hover { border-color: #B5572E; color: #B5572E; background: #F7E8E1; }
    .progress-text { font-size: 13px; font-weight: 600; color: var(--text3); }

    /* ── Progress bar ── */
    .progress-wrap { height: 10px; background: var(--surface2); border-radius: 999px; overflow: hidden; margin-bottom: 18px; }
    .progress-bar { height: 100%; border-radius: 999px; transition: width .3s; background: var(--gold); }

    /* ── Question card ── */
    .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(28,37,48,.08), 0 8px 24px rgba(28,37,48,.10); }
    .q-badge { display: inline-block; font-size: 11px; font-weight: 700; border-radius: 8px; padding: 4px 12px; margin-bottom: 8px; background: #E8EDE6; color: #4A6B4F; font-family: 'Zen Maru Gothic', sans-serif; }
    body.dark .q-badge { background: #24302A; color: #8FBE95; }
    .q-text { font-size: 18px; line-height: 1.65; color: var(--text); font-weight: 600; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .q-sub { font-size: 14px; color: var(--text2); margin-top: 6px; line-height: 1.5; }

    /* ── Quiz question card (centered, mockup) ── */
    #quiz-screen .q-card { text-align: center; border-radius: 22px; padding: 36px 20px; }
    #quiz-screen .q-badge { margin-bottom: 12px; }
    .q-emoji { font-size: 64px; line-height: 1; margin: 4px 0 2px; }
    /* The English prompt is a plain centered line — no inline speaker button
       crowding it (the TTS control lives on its own centered line below). */
    #quiz-screen .q-text { display: block; font-size: 28px; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; margin-top: 8px; }
    .q-tts { display: flex; justify-content: center; margin-top: 12px; }
    .q-tts:empty { display: none; }
    #quiz-screen .q-sub { font-size: 14px; color: var(--text3); margin-top: 12px; }

    /* ── Options (2×2, thick border, mockup) ── */
    .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 20px; }
    .opt-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px; padding: 22px 14px;
      border-radius: 18px; border: 3px solid #E4E0D4; cursor: pointer;
      font-size: 18px; font-weight: 700; text-align: center; background: var(--surface);
      transition: all .15s; font-family: 'Zen Maru Gothic', sans-serif; color: var(--text);
    }
    body.dark .opt-btn { border-color: var(--border); }
    .opt-btn:hover:not(.locked) { border-color: var(--gold); background: var(--surface2); }
    .opt-letter {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 7px; background: var(--surface2);
      font-weight: 700; font-size: 13px; flex-shrink: 0; font-family: 'Zen Maru Gothic', sans-serif;
    }
    .opt-btn.correct { background: #E8EDE6; border-color: #4A6B4F; color: #34503A; }
    .opt-btn.wrong   { background: #F7E8E1; border-color: #B5572E; color: #96471F; }
    body.dark .opt-btn.correct { background: #24302A; color: #8FBE95; }
    body.dark .opt-btn.wrong   { background: #2F241E; color: #D68C6A; }
    .opt-btn.locked  { cursor: default; }

    /* ── Feedback ── */
    .feedback-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 8px; }
    .fb-text { font-size: 18px; }
    .next-btn {
      padding: 10px 22px; color: #fff; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Zen Maru Gothic', sans-serif;
      background: #4A6B4F; transition: background .15s;
    }
    .next-btn:hover { background: #34503A; }

    /* ── Hint box ── */
    .hint-box { background: #FBF3E1; border: 1px solid var(--gold); border-radius: 10px; padding: 11px 13px; margin-top: 10px; font-size: 14px; line-height: 1.6; color: #A8843A; }
    body.dark .hint-box { background: #2E2600; border-color: #7C6C00; color: #E8C976; }

    /* ── Score donut (conic-gradient, mockup) ── */
    .review-header { text-align: center; padding: 20px 0 10px; }
    .score-donut {
      display: inline-flex; align-items: center; justify-content: center;
      width: 170px; height: 170px; border-radius: 50%; margin-bottom: 8px;
      background: conic-gradient(#4A6B4F 0% 0%, var(--surface2) 0% 100%);
    }
    .score-donut-inner {
      width: 134px; height: 134px; border-radius: 50%; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .score-pct { font-size: 36px; font-weight: 800; color: #4A6B4F; font-family: 'Zen Maru Gothic', sans-serif; }
    .score-lbl { font-size: 12px; color: var(--text3); }
    .grade-text { font-size: 24px; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; margin-top: 8px; }

    /* ── Result detail ── */
    .result-list { display: flex; flex-direction: column; gap: 8px; margin: 14px 0; }
    .result-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .result-q { font-size: 13px; font-weight: 600; color: var(--text2); }
    .result-ans { font-size: 14px; margin-top: 3px; }

    /* ── Matching activity ── */
    .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .match-col { display: flex; flex-direction: column; gap: 8px; }
    .match-item {
      padding: 10px 12px; border-radius: 10px; border: 2px solid var(--border);
      background: var(--surface); cursor: pointer; font-size: 15px; font-weight: 600;
      text-align: center; transition: all .15s; font-family: inherit; color: var(--text);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .match-item:hover:not(.matched):not(.locked) { border-color: var(--gold); background: var(--surface2); }
    .match-item.selected { border-color: #4A6B4F; background: #E8EDE6; color: #4A6B4F; }
    .match-item.matched { border-color: #4A6B4F; background: #E8EDE6; color: #34503A; cursor: default; }
    .match-item.wrong-flash { border-color: #B5572E; background: #F7E8E1; }
    body.dark .match-item.selected { background: #24302A; color: #8FBE95; }
    body.dark .match-item.matched { background: #24302A; color: #8FBE95; }
    body.dark .match-item.wrong-flash { background: #2F241E; }
    .match-text { flex: 1; }

    /* ── Word Arrange ── */
    .word-bank { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 44px; padding: 8px; background: var(--surface2); border-radius: 10px; }
    .word-chip {
      padding: 8px 14px; border-radius: 8px; border: 2px solid var(--border);
      background: var(--surface); cursor: pointer; font-size: 15px; font-weight: 600;
      transition: all .15s; font-family: inherit; color: var(--text);
    }
    .word-chip:hover { border-color: var(--gold); background: var(--accent2); }
    .word-chip.used { opacity: 0.3; cursor: default; pointer-events: none; }
    .answer-row { display: flex; flex-wrap: wrap; gap: 8px; min-height: 44px; padding: 8px; background: var(--surface); border: 2px dashed var(--border); border-radius: 10px; margin-bottom: 10px; align-items: center; }
    .answer-row[data-empty="true"]::before { content: "単語をタップして並べよう"; color: var(--text3); font-size: 14px; font-style: italic; }
    .answer-chip {
      padding: 8px 14px; border-radius: 8px; border: 2px solid #4A6B4F;
      background: #E8EDE6; cursor: pointer; font-size: 15px; font-weight: 600;
      color: var(--text); font-family: inherit;
    }
    .answer-chip:hover { background: #DCE6D9; }
    body.dark .answer-chip { background: #24302A; }
    body.dark .answer-chip:hover { background: #2D3B31; }

    /* ── Primary / action btns ── */
    .primary-btn {
      display: block; width: 100%; padding: 17px; background: #3A4555; color: #fff;
      border: none; border-radius: 16px; font-size: 17px; font-weight: 700; cursor: pointer;
      margin-top: 12px; font-family: 'Zen Maru Gothic', sans-serif; transition: background .15s, border-color .15s;
    }
    .primary-btn:hover { background: #1C2530; }
    .primary-btn.blue { background: #4A6B4F; }
    .primary-btn.blue:hover { background: #34503A; }
    .primary-btn.ghost { background: var(--surface); border: 2px solid var(--border); color: var(--text2); }
    .primary-btn.ghost:hover { background: var(--surface2); border-color: var(--text3); }
    .check-btn {
      display: block; width: 100%; padding: 13px; background: #4A6B4F; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 10px; font-family: 'Zen Maru Gothic', sans-serif; transition: background .15s;
    }
    .check-btn:hover { background: #34503A; }
    .check-btn:disabled { background: var(--border); color: var(--text3); cursor: default; }

    /* ── Flashcard ── */
    .flashcard-wrap { perspective: 1000px; margin: 20px auto; max-width: 400px; }
    .flashcard {
      width: 100%; height: 180px; position: relative; transform-style: preserve-3d;
      transition: transform .5s; cursor: pointer; border-radius: 16px;
    }
    .flashcard.flipped { transform: rotateY(180deg); }
    .fc-face {
      position: absolute; inset: 0; border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      backface-visibility: hidden; padding: 20px;
      border: 2px solid var(--border); box-shadow: 0 4px 16px var(--shadow);
    }
    .fc-front { background: var(--surface); }
    .fc-back  { background: #E8EDE6; transform: rotateY(180deg); }
    body.dark .fc-back { background: #24302A; }
    .fc-emoji { font-size: 42px; margin-bottom: 8px; }
    .fc-word  { font-size: 22px; font-weight: 700; color: var(--text); display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; font-family: 'Zen Maru Gothic', sans-serif; }
    .fc-hint  { font-size: 13px; color: var(--text3); margin-top: 4px; }
    .fc-translation { font-size: 20px; font-weight: 700; color: #4A6B4F; font-family: 'Zen Maru Gothic', sans-serif; }
    .fc-nav { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 12px; }
    .fc-nav-btn {
      padding: 8px 18px; border-radius: 8px; border: 2px solid var(--border);
      background: var(--surface); cursor: pointer; font-size: 14px; font-weight: 600;
      font-family: inherit; color: var(--text2); transition: all .15s;
    }
    .fc-nav-btn:hover { border-color: var(--gold); color: #4A6B4F; }
    .fc-counter { font-size: 14px; color: var(--text3); min-width: 60px; text-align: center; }

    /* ── Chant / Listening ── */
    .chant-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 6px var(--shadow); }
    .chant-title { font-size: 14px; font-weight: 700; color: #4A6B4F; margin-bottom: 10px; font-family: 'Zen Maru Gothic', sans-serif; }
    .chant-line { font-size: 16px; line-height: 1.8; color: var(--text); }
    .chant-line.highlight { color: #4A6B4F; font-weight: 700; }
    .play-btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px;
      border-radius: 8px; border: 2px solid var(--border); background: var(--surface);
      cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit;
      color: var(--text2); transition: all .15s; margin-top: 8px;
    }
    .play-btn:hover { border-color: var(--gold); color: #4A6B4F; }

    /* ── Day-of-week wheel ── */
    .days-wheel { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin: 14px 0; }
    .day-pill {
      padding: 10px 14px; border-radius: 20px; border: 2px solid var(--border);
      background: var(--surface); cursor: pointer; font-size: 14px; font-weight: 700;
      font-family: inherit; color: var(--text); transition: all .15s;
    }
    .day-pill.active { color: #fff; border-color: transparent; }

    /* ── Clock activity ── */
    .clock-svg { display: block; margin: 0 auto 14px; }
    .time-display { text-align: center; font-size: 32px; font-weight: 800; color: #4A6B4F; margin-bottom: 8px; font-family: 'Zen Maru Gothic', sans-serif; }

    /* ── Weather icons ── */
    .weather-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 14px 0; }
    .weather-card {
      display: flex; flex-direction: column; align-items: center; padding: 12px 6px;
      border-radius: 12px; border: 2px solid var(--border); background: var(--surface);
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .weather-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .weather-card.selected { border-color: #4A6B4F; background: var(--accent2); }
    .weather-icon { font-size: 32px; margin-bottom: 4px; }
    .weather-word { font-size: 12px; font-weight: 700; color: var(--text2); }

    .hidden { display: none !important; }

    /* ── Stat card ── */

// TTS HELPERS (uses tts.js — window.NHTTS)
// ══════════════════════════════════════════════════════════
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Builds a speaker-icon button that reads `text` aloud. `text` is the RAW
// (unescaped) string to be spoken; this escapes it for the data attribute.
function ttsBtn(text, extraClass) {
  if (!text) return '';
  const safe = esc(text).replace(/"/g, '&quot;');
  return `<button type="button" class="tts-btn${extraClass ? ' ' + extraClass : ''}" data-tts="${safe}" aria-label="発音を聞く" title="発音を聞く">🔊</button>`;
}

  screens.forEach(s => document.getElementById(s).classList.toggle("hidden", s !== id));

// ── Lightweight per-unit practice progress (localStorage; presentation-only,
// fails soft). Drives the unit-card progress bars / "X/Y かんりょう" label.
function loadProgress() {
  try { return JSON.parse(localStorage.getItem("lt2-progress") || "{}"); }
  catch (e) { return {}; }
}
function markProgress(unitId, type) {
  if (!unitId) return;
  try {
    const p = loadProgress();
    (p[unitId] = p[unitId] || {})[type] = true;
    localStorage.setItem("lt2-progress", JSON.stringify(p));
  } catch (e) { /* ignore quota/serialization errors */ }
}

function renderHome() {
  const progress = loadProgress();

  // ── Unit cards ──
  const grid = document.getElementById("unit-grid");
  grid.innerHTML = "";
  UNITS.filter(Boolean).forEach(u => {
    const card = document.createElement("button");
    card.className = "unit-card" + (currentUnit === u.id ? " selected" : "");
    card.style.setProperty("--uc-accent", u.color);
    const acts = u.activities || [];
    const done = acts.filter(a => progress[u.id] && progress[u.id][a]).length;
    const total = acts.length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    card.innerHTML = `
      <div class="uc-num">UNIT ${u.id}</div>
      <div class="uc-title">${esc(u.title)}</div>
      <div class="uc-sub">${esc(u.titleJp)}</div>
      <div class="uc-bar"><div class="uc-fill" style="width:${pct}%"></div></div>

      currentUnit = u.id;
      renderHome();
      document.getElementById("mode-panel").scrollIntoView({ behavior: "smooth", block: "nearest" });
    });
    grid.appendChild(card);
  });

  document.getElementById("all-units-btn").classList.toggle("active", currentUnit === 0);

  // ── Mode picker panel ──
  const titleEl = document.getElementById("mode-panel-title");
  const subEl = document.getElementById("mode-panel-sub");

  modeGrid.innerHTML = "";

  let unitData = null, keys;

    unitData = UNITS[currentUnit];
    titleEl.textContent = `Unit ${unitData.id}: ${unitData.title} をれんしゅうしよう`;
    subEl.textContent = unitData.titleJp;
    keys = unitData.activities;
  } else {
    titleEl.textContent = "全ユニットをまとめて練習";
    subEl.textContent = "Unit 1〜9 の内容からランダムに出題します";
    keys = Object.keys(ACTIVITY_DEFS);
  }

  keys.forEach(key => {
    const def = ACTIVITY_DEFS[key];
    if (!def) return;
    const btn = document.createElement("button");
    btn.className = "mode-btn";
    btn.innerHTML = `
      <span class="mode-emoji">${def.icon}</span>
      <span class="mode-label">${def.label}</span>
      <span class="mode-desc">${def.desc}</span>

    btn.addEventListener("click", () => launchActivity(key, unitData));
    modeGrid.appendChild(btn);
  });
}

function launchActivity(type, unitData) {
  currentActivity = type;
  currentUnitData = unitData;
  if (unitData) markProgress(unitData.id, type);
  if (type === "vocab")  startQuiz(unitData);
  if (type === "flash")  startFlash(unitData);
  if (type === "match")  startMatch(unitData);
  if (type === "build")  startBuild(unitData);
}

function buildQuizItems(unitData) {
  const allVocab = unitData
    ? unitData.vocab.map(v => ({...v, unit: unitData.id, unitTitle: unitData.title, unitColor: unitData.color}))
    : UNITS.filter(Boolean).flatMap(u => u.vocab.map(v => ({...v, unit: u.id, unitTitle: u.title, unitColor: u.color})));

  return shuffle(allVocab).slice(0, Math.min(15, allVocab.length)).map(item => {
    // Build 4 choices: correct + 3 distractors
    const pool = UNITS.filter(Boolean).flatMap(u => u.vocab).filter(v => v.jp !== item.jp);
    const distractors = shuffle(pool).slice(0, 3).map(v => v.jp);
    const choices = shuffle([item.jp, ...distractors]);
    return { ...item, choices, correct: item.jp };
  });
}

function startQuiz(unitData) {
  qItems = buildQuizItems(unitData);
  qIdx = 0; qScore = 0; qResults = [];
  renderQuizQ();
  showScreen("quiz-screen");
}

function renderQuizQ() {
  if (window.NHTTS) NHTTS.stop();
  const item = qItems[qIdx];
  const total = qItems.length;
  document.getElementById("quiz-badge").textContent = `Unit ${item.unit} · ${item.unitTitle}`;
  document.getElementById("quiz-badge").style.background = item.unitColor + "22";
  document.getElementById("quiz-badge").style.color = item.unitColor;
  document.getElementById("quiz-emoji").textContent = item.emoji;
  // quiz-q holds ONLY the English prompt (clean centered line, never crowded).
  // The speaker button sits on its own centered line below (quiz-tts). The four
  // choices are Japanese, so they don't get one.
  document.getElementById("quiz-q").textContent = item.en;
  document.getElementById("quiz-tts").innerHTML = ttsBtn(item.en, 'qword-tts');
  document.getElementById("quiz-sub").textContent = "日本語の意味は？";
  document.getElementById("quiz-prog-text").textContent = `${qIdx + 1} / ${total}`;
  document.getElementById("quiz-prog-bar").style.width = `${((qIdx) / total) * 100}%`;
  document.getElementById("quiz-hint").classList.add("hidden");
  document.getElementById("quiz-feedback").classList.add("hidden");
  document.getElementById("quiz-run-score").textContent = `現在の成績: ${qScore} / ${qIdx}`;

  const opts = document.getElementById("quiz-opts");
  opts.innerHTML = "";
  item.choices.forEach((ch) => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.textContent = ch;
    btn.addEventListener("click", () => chooseQuizOpt(btn, ch, item));
    opts.appendChild(btn);
  });
}

function chooseQuizOpt(btn, choice, item) {
  const correct = choice === item.correct;
  document.querySelectorAll(".opt-btn").forEach(b => {
    b.classList.add("locked");
    if (b.textContent.trim().includes(item.correct)) b.classList.add("correct");
  });
  if (!correct) btn.classList.add("wrong");
  if (correct) qScore++;
  qResults.push({ item, correct, chosen: choice });
  document.getElementById("quiz-hint").textContent = `💡 ${item.hint}`;
  document.getElementById("quiz-hint").classList.remove("hidden");
  document.getElementById("quiz-fb-icon").textContent = correct ? "⭕ 正解！" : "❌ 不正解";
  document.getElementById("quiz-feedback").classList.remove("hidden");
}

// ══════════════════════════════════════════════════════════
function startMatch(unitData) {
  matchScore = 0; matchTotal = 0; matchRound = 0; matchSelected = null;
  const pairs = unitData ? unitData.matchPairs : UNITS.filter(Boolean).flatMap(u => u.matchPairs);
  matchLeft = shuffle(pairs).slice(0, 6);
  matchTotal = matchLeft.length;
  renderMatchRound(matchLeft);
  showScreen("match-screen");
}

function renderMatchRound(pairs) {
  if (window.NHTTS) NHTTS.stop();
  matchSelected = null;
  const lefts = shuffle(pairs.map(p => p[0]));
  const rights = shuffle(pairs.map(p => p[1]));
  document.getElementById("match-instructions").textContent = "英語と日本語を結びつけよう！";
  document.getElementById("match-score-text").textContent = `${matchScore} / ${matchTotal}`;
  document.getElementById("match-result").classList.add("hidden");
  document.getElementById("match-next-round").classList.add("hidden");

  const leftCol = document.getElementById("match-left");
  const rightCol = document.getElementById("match-right");
  leftCol.innerHTML = ""; rightCol.innerHTML = "";

  const pairMap = Object.fromEntries(pairs.map(p => [p[0], p[1]]));

  // NOTE: matchPairs are always defined as [English, Japanese], and the
  // "lefts"/"rights" arrays above are built from p[0]/p[1] respectively —
  // so the LEFT column is always the English side, regardless of how each
  // column gets independently shuffled. Only the left side gets a speaker.
  //
  // Left items are built as <div role="button"> rather than a real
  // <button>, because we need to nest a speaker <button> inside them and
  // HTML doesn't allow a <button> inside another <button> (browsers
  // silently split/auto-close that markup, breaking the click handling).
  // Right items (Japanese, no nested button) stay as plain <button>s.
  function makeItem(text, side, idx) {
    let el;
    if (side === 'L') {
      el = document.createElement('div');
      el.setAttribute('role', 'button');
      el.tabIndex = 0;
      el.innerHTML = `<span class="match-text">${esc(text)}</span>${ttsBtn(text, 'match-tts')}`;
      el.onkeydown = (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          if (!e.target.closest('.tts-btn')) handleMatchClick(el, text, side, pairMap);
        }
      };
    } else {
      el = document.createElement('button');
      el.textContent = text;
    }
    el.className = "match-item";
    el.dataset.side = side;
    el.dataset.idx = idx;
    el.addEventListener("click", (e) => {
      // Don't treat a tap on the speaker icon as a match selection.
      if (e.target.closest('.tts-btn')) return;
      handleMatchClick(el, text, side, pairMap);
    });
    return el;
  }

  lefts.forEach((t, i) => leftCol.appendChild(makeItem(t, "L", i)));
  rights.forEach((t, i) => rightCol.appendChild(makeItem(t, "R", i)));
}

function handleMatchClick(el, text, side, pairMap) {
  if (el.classList.contains("matched")) return;

  if (!matchSelected) {
    if (matchSelected && matchSelected.el === el) { el.classList.remove("selected"); matchSelected = null; return; }
    document.querySelectorAll(".match-item.selected").forEach(e => e.classList.remove("selected"));
    el.classList.add("selected");
    matchSelected = { el, text, side };
    return;
  }

  if (matchSelected.side === side) {
    document.querySelectorAll(".match-item.selected").forEach(e => e.classList.remove("selected"));
    el.classList.add("selected");
    matchSelected = { el, text, side };
    return;
  }

  // Attempt to match
  const L = side === "L" ? text : matchSelected.text;
  const R = side === "R" ? text : matchSelected.text;
  const isCorrect = pairMap[L] === R;

  if (isCorrect) {
    matchSelected.el.classList.remove("selected");
    matchSelected.el.classList.add("matched");
    el.classList.add("matched");
    matchScore++;
    document.getElementById("match-score-text").textContent = `${matchScore} / ${matchTotal}`;
    matchSelected = null;

    // Check if round complete
    const unmatched = document.querySelectorAll(".match-item:not(.matched)");
    if (unmatched.length === 0) {
      document.getElementById("match-result").textContent = "🎉 全部合っています！素晴らしい！";
      document.getElementById("match-result").classList.remove("hidden");
      document.getElementById("match-next-round").classList.remove("hidden");
    }
  } else {
    [matchSelected.el, el].forEach(e => {
      e.classList.add("wrong-flash");
      setTimeout(() => { e.classList.remove("wrong-flash","selected"); }, 700);
    });
    matchSelected = null;
  }
}

document.getElementById("match-next-round").addEventListener("click", () => {
  const unitData = currentUnitData;
  const pairs = unitData ? unitData.matchPairs : UNITS.filter(Boolean).flatMap(u => u.matchPairs);
  const newPairs = shuffle(pairs).slice(0, 6);
  matchTotal += newPairs.length;
  renderMatchRound(newPairs);
});
document.getElementById("match-back").addEventListener("click", () => showScreen("home-screen"));

// ══════════════════════════════════════════════════════════
// SENTENCE BUILD
// ══════════════════════════════════════════════════════════
function startBuild(unitData) {
  buildItems = unitData
    ? [...unitData.sentences]
    : shuffle(UNITS.filter(Boolean).flatMap(u => u.sentences));
  buildIdx = 0; buildScore = 0; qResults = [];
  renderBuildQ();
  showScreen("build-screen");
}

function renderBuildQ() {
  const item = buildItems[buildIdx];
  const total = buildItems.length;
  document.getElementById("build-jp").textContent = item.jp;
  document.getElementById("build-prog").textContent = `${buildIdx + 1} / ${total}`;
  document.getElementById("build-prog-bar").style.width = `${(buildIdx / total) * 100}%`;
  document.getElementById("build-hint").classList.add("hidden");
  document.getElementById("build-feedback").classList.add("hidden");
  document.getElementById("build-check").disabled = true;

  buildAnswer = [];
  buildBank = shuffle([...item.words]);

  renderBuildBankAndAnswer(item);
}

function renderBuildBankAndAnswer(item) {
  const bankEl = document.getElementById("build-bank");
  const answerEl = document.getElementById("build-answer");

  bankEl.innerHTML = "";
  answerEl.innerHTML = "";

  // Show placeholder text via data attribute + CSS instead of moving a DOM node
  answerEl.dataset.empty = buildAnswer.length === 0 ? "true" : "false";

  buildBank.forEach((word, i) => {
    const chip = document.createElement("button");
    chip.className = "word-chip" + (buildAnswer.includes(i) ? " used" : "");
    chip.textContent = word;
    if (!buildAnswer.includes(i)) {
      chip.addEventListener("click", () => {
        buildAnswer.push(i);
        renderBuildBankAndAnswer(item);
        document.getElementById("build-check").disabled = buildAnswer.length !== buildBank.length;
      });
    }
    bankEl.appendChild(chip);
  });

  buildAnswer.forEach((bankIdx, pos) => {
    const chip = document.createElement("button");
    chip.className = "answer-chip";
    chip.textContent = buildBank[bankIdx];
    chip.addEventListener("click", () => {
      buildAnswer.splice(pos, 1);
      renderBuildBankAndAnswer(item);
      document.getElementById("build-check").disabled = buildAnswer.length !== buildBank.length;
    });
    answerEl.appendChild(chip);
  });
}

document.getElementById("build-check").addEventListener("click", () => {
  const item = buildItems[buildIdx];
  const userAns = buildAnswer.map(i => buildBank[i]).join(" ");
  const correct = userAns.toLowerCase() === item.words.join(" ").toLowerCase();
  if (correct) buildScore++;
  qResults.push({ item: { en: item.jp, emoji:"🧩" }, correct, chosen: userAns });

  // Lock all chips
  document.querySelectorAll(".word-chip, .answer-chip").forEach(c => { c.style.pointerEvents = "none"; });

  document.getElementById("build-hint").textContent = correct
    ? `✅ 正解！ → ${item.words.join(" ")}`
    : `❌ 正しい答え: ${item.words.join(" ")} 💡 ${item.hint}`;
  document.getElementById("build-hint").classList.remove("hidden");
  document.getElementById("build-hint").style.color = correct ? "#34503A" : "#A8843A";
  document.getElementById("build-hint").style.background = correct ? "#E8EDE6" : "#FBF3E1";
  document.getElementById("build-hint").style.borderColor = correct ? "#4A6B4F" : "#C9A24B";

  document.getElementById("build-fb-icon").textContent = correct ? "⭕ 正解！" : "❌ 不正解";
  document.getElementById("build-feedback").classList.remove("hidden");
  document.getElementById("build-check").disabled = true;
});

document.getElementById("build-next").addEventListener("click", () => {
  buildIdx++;
  if (buildIdx >= buildItems.length) showReview("build");
  else renderBuildQ();
});
document.getElementById("build-back").addEventListener("click", () => showScreen("home-screen"));

// ══════════════════════════════════════════════════════════
// REVIEW
// ══════════════════════════════════════════════════════════
async function showReview(from) {
  const correct = qResults.filter(r => r.correct).length;
  const total = qResults.length;
  const pct = total ? Math.round((correct / total) * 100) : 0;

  document.getElementById("rv-pct").textContent = pct + "%";
  document.getElementById("rv-donut").style.background =
    `conic-gradient(#4A6B4F 0% ${pct}%, var(--surface2) ${pct}% 100%)`;
  document.getElementById("rv-correct").textContent = correct;
  document.getElementById("rv-wrong").textContent = total - correct;
  document.getElementById("rv-total").textContent = total;
  document.getElementById("rv-grade").textContent =
    pct >= 90 ? "🌟 優秀！Excellent!" :
    pct >= 70 ? "😊 よくできました！Good job!" :
    pct >= 50 ? "📚 もう少し練習しよう！Keep trying!" :
    "💪 頑張れ！Practice more!";

  const list = document.getElementById("rv-list");
  list.innerHTML = "";
  qResults.forEach(r => {
    const row = document.createElement("div");
    row.className = "result-row";
    row.innerHTML = `
      <div class="result-q">${r.item.emoji || "📝"} ${r.item.en || r.item.jp || ""}</div>
      <div class="result-ans">${r.correct ? "⭕" : "❌"} ${r.chosen}</div>
    `;
    list.appendChild(row);
  });

  document.getElementById("rv-retry").onclick = () => {
    if (from === "quiz") startQuiz(currentUnitData);
    else startBuild(currentUnitData);
  };
  document.getElementById("rv-menu").onclick = () => showScreen("home-screen");
  showScreen("review-screen");

  // ── Gakuenza sync ──────────────────────────────────────────
  // The old bridge sniffed the DOM (MutationObserver + parsed text
  // content) to figure out what just happened. We don't need that
  // anymore: showReview() already knows the activity type (`from`,
  // i.e. "quiz" or "build" — matching currentActivity) and the unit
  // (currentUnit, 0 = all units) directly from app state.
  const syncEl = document.getElementById("rv-sync");
  syncEl.textContent = "";
  syncEl.classList.remove("error");
  // Per-question detail for activity_result_items (gradebook per-question
  // analysis). Both quiz and build populate qResults, so both report detail.
  const items = qResults.map((r, i) => ({
    itemRef: "unit" + currentUnit + "/" + from + "/" + i,
    category: from,
    prompt: r.item.en || r.item.jp || "",
    correct: !!r.correct,
    selectedAnswer: r.chosen,
    correctAnswer: r.item.correct || r.item.jp || null,
  }));
  if (typeof window.hk !== "undefined") {
    try {
      await window.hk.syncQuizResult({
        level: "unit" + currentUnit,
        setId: "unit" + currentUnit,
        category: from,
        correct,
        total,
        app_id: "letstry2",
        items,
      });
      syncEl.textContent = "✓ 成績を保存しました";
    } catch (e) {
      console.warn("[LetsTry2] sync error:", e.message);
      syncEl.textContent = "⚠️ 保存に失敗しました";
      syncEl.classList.add("error");
    }
  }
}

// ══════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
