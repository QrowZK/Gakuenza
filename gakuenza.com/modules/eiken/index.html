<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="英検 Practice — 英検5級から準2級まで1,428問の練習問題">
  <title>英検 Practice — がくえん座</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="module-topbar">
  <a href="../../hub/index.html" class="module-back">← ホームへ</a>
  <span class="module-name">英検 Practice</span>
  <div id="module-account-mount" style="margin-left:auto;"></div>
</div>
<div class="page-layout">
<div class="main-col" id="app">


  <div id="menu-screen">
    <div class="header">
      <div class="header-icon" id="hdr-icon">英検</div>
      <h1 id="hdr-title">英検 Practice</h1>
      <p id="hdr-sub">1,428 問題 · 4 レベル · 3 セット</p>
    </div>

    <!-- Level tabs + theme toggle -->
    <div class="top-controls">
      <div class="level-tabs" id="level-tabs">
        <button class="level-tab" data-level="5">5級</button>
        <button class="level-tab" data-level="4">4級</button>
        <button class="level-tab" data-level="3">3級</button>
        <button class="level-tab" data-level="P">準2級</button>
      </div>
      <button class="theme-btn" id="theme-btn" title="ライト/ダークモード">🌙</button>
    </div>

    <!-- Set tabs -->
    <div class="set-tabs" id="set-tabs">
      <button class="set-tab active" data-set="1">セット 1</button>
      <button class="set-tab" data-set="2">セット 2</button>
      <button class="set-tab" data-set="3">セット 3</button>
    </div>

    <div class="menu-grid" id="menu-grid"></div>
    <p class="footer">レベルとセットを選んでください</p>
  </div>

  <div id="quiz-screen" class="hidden">
    <div class="quiz-topbar">
      <button class="quit-btn" id="quit-btn">← メニュー</button>

    </div>
    <div class="progress-wrap"><div class="progress-bar" id="prog-bar"></div></div>
    <div class="progress-text" id="prog-text"></div>
    <div class="q-card">
      <span class="badge" id="q-badge"></span>
      <p class="q-text" id="q-text"></p>
    </div>
    <div class="opts" id="opts"></div>
    <div class="explanation hidden" id="explanation">
      <span class="explanation-title">解説：</span>
      <span id="exp-text"></span>
    </div>
    <div class="feedback hidden" id="feedback">
      <span id="fb-text"></span>
      <button class="next-btn" id="next-btn">次へ →</button>
    </div>
    <div class="run-score" id="run-score"></div>
  </div>

  <div id="review-screen" class="hidden">
    <div class="review-header">
      <div class="score-circle" id="rv-circle">
        <div class="score-pct" id="rv-pct"></div>
        <div class="score-label" id="rv-label"></div>
      </div>
      <h2 class="grade-text" id="rv-grade"></h2>
    </div>
    <div id="rv-stats-breakdown"></div>
    <div class="wrong-section" id="wrong-section"></div>
    <button class="primary-btn" id="back-btn">メニューに戻る</button>
  </div>

  <div id="stats-screen" class="hidden">
    <div class="stats-header">
      <h2>📊 成績</h2>
      <p id="stats-sub">あなたの通算成績</p>
    </div>
    <div class="stats-overall" id="stats-overall"></div>
    <div id="stats-cats"></div>
    <div class="stats-btn-row">
      <button class="primary-btn" id="stats-back-btn">メニューに戻る</button>
    </div>
    <div class="stats-btn-row">
      <button class="danger-btn" id="stats-reset-btn">成績をリセット</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- INTERVIEW SCREENS -->
<!-- ═══════════════════════════════════════════════════════════ -->

<!-- Level picker -->
<div id="iv-level-screen" class="hidden">
  <div class="header">
    <div class="header-icon" id="iv-hdr-icon" style="background:#37474F">英検</div>
    <h1>面接練習</h1>
    <p>Interview Speaking Practice</p>
  </div>
  <div class="iv-level-grid">
    <button class="iv-level-btn" data-iv-level="3"
      style="border-color:#512DA8">
      <span class="iv-level-badge" style="background:#512DA8">3級</span>
      <div class="iv-level-info">
        <div class="iv-level-name" style="color:#512DA8">英検3級 面接</div>
        <div class="iv-level-desc">パッセージ・イラスト・意見 / 10セッション</div>
      </div>
    </button>
    <button class="iv-level-btn" data-iv-level="P"
      style="border-color:#00897B">
      <span class="iv-level-badge" style="background:#00897B">準2級</span>
      <div class="iv-level-info">
        <div class="iv-level-name" style="color:#00897B">英検準2級 面接</div>
        <div class="iv-level-desc">パッセージ・2イラスト・意見 / 10セッション</div>
      </div>
    </button>
  </div>
  <button class="primary-btn" id="iv-back-to-menu" style="margin-top:20px">← メインメニューへ</button>
</div>

<!-- Session picker -->
<div id="iv-session-screen" class="hidden">
  <button class="quit-btn" id="iv-back-to-levels" style="margin-bottom:12px">← レベル選択へ</button>
  <div class="header" style="padding-top:6px">
    <h1 id="iv-session-title">セッション選択</h1>
    <p>練習するトピックを選んでください</p>
  </div>
  <div id="iv-session-grid" class="menu-grid"></div>
</div>

<!-- Quiz / speaking screen -->
<div id="iv-quiz-screen" class="hidden">
  <div class="quiz-topbar">
    <button class="quit-btn" id="iv-quit-session">← セッション一覧</button>
    <span id="iv-progress" style="font-size:13px;color:var(--text3)"></span>
  </div>

  <div class="iv-topic-bar">
    <span id="iv-phase-label" style="font-size:13px;color:var(--text2)"></span>
    <span id="iv-topic-label" style="font-size:14px;font-weight:700"></span>
  </div>

  <div id="iv-content-area" class="iv-content-area"></div>

  <div id="iv-transcript-area" class="iv-transcript-area"></div>
  <div id="iv-feedback-area" class="iv-feedback-area"></div>

  <div class="iv-action-row">
    <button class="iv-btn-listen" id="iv-btn-listen">🔊 聞く</button>
    <button class="iv-btn-record" id="iv-btn-record" style="display:none">🎤 回答を話す</button>
  </div>
  <div class="iv-action-row" style="margin-top:8px">
    <button class="iv-btn-reveal" id="iv-btn-reveal" style="display:none">📖 模範解答を見る</button>
    <button class="next-btn" id="iv-btn-next" style="display:none">次へ →</button>
  </div>
</div>

<!-- Results screen -->
<div id="iv-results-screen" class="hidden">
  <div class="review-header">
    <div class="score-circle" id="iv-result-circle">
      <div class="score-pct" id="iv-result-pct"></div>
      <div class="score-label">平均スコア</div>
    </div>
    <h2 class="grade-text" id="iv-result-grade"></h2>
    <p style="color:var(--text3);font-size:13px;margin-top:4px" id="iv-result-topic"></p>
  </div>
  <div id="iv-result-detail" class="iv-result-detail"></div>
  <button class="primary-btn" id="iv-results-retry">🔄 もう一度練習</button>
  <button class="danger-btn" id="iv-results-menu" style="margin-top:10px">← セッション一覧へ</button>
</div>


</div><!-- end main-col -->

<!-- Side panel tracker -->
<div class="side-panel" id="side-panel">
  <div class="side-panel-title" id="panel-title">進捗</div>
  <div class="tracker-grid" id="tracker-grid"></div>
</div>

</div><!-- end page-layout -->

<div id="modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 id="modal-title">確認</h3>
    <p id="modal-msg">よろしいですか？</p>
    <div class="modal-btns">
      <button class="modal-cancel" id="modal-cancel">キャンセル</button>
      <button class="modal-confirm" id="modal-confirm">確認</button>
    </div>
  </div>
</div>


<script src="questions.js"></script>
<script src="app.js"></script>
<script src="interview.js"></script>
<script src="../../hub/supabase.js"></script>
<script src="../../hub/config.js"></script>
<script src="../../hub/hub-common.js"></script>
<script src="eiken-report.js"></script>
</body>
</html>
