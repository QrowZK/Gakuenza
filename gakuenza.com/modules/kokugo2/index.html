<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国語 2年 — がくえん座</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="module-topbar">
  <a class="module-back" href="../../hub/index.html">‹ ハブへもどる</a>
  <span class="module-name">国語 2年</span>
  <div id="module-account-mount"></div>
</header>
<div class="wrap">
  <div class="k2-header">
    <span class="k2-dot"></span>
    <div>
      <h1 class="k2-title">国語 2年</h1>
      <p class="k2-sub" id="k2-subtitle">かん字・ことばの れんしゅう</p>
    </div>
  </div>

  <div id="view-select">
    <div class="k2-card">
      <div class="k2-mode-grid">
        <button type="button" class="k2-mode-btn" id="btn-mode-kanji">
          <h3>かん字れんしゅう</h3>
          <p>2年生で ならう 160字から、読み方・かん字えらび・画数の もんだいが 出ます。</p>
        </button>
        <button type="button" class="k2-mode-btn" id="btn-mode-grammar">
          <h3>ことば・文の きまり</h3>
          <p>カタカナ・かなづかい・主語と述語・なかまの言葉・丸点かぎの れんしゅうです。</p>
        </button>
      </div>
    </div>
  </div>

  <div id="view-unit-select" style="display:none;">
    <div class="k2-card" id="unit-list"></div>
    <button type="button" class="k2-btn-ghost" id="btn-back-1">もどる</button>
  </div>

  <div id="view-quiz" style="display:none;">
    <div class="k2-progress" id="k2-progress"></div>
    <div class="k2-card">
      <span class="k2-cat" id="k2-cat"></span>
      <p class="k2-prompt" id="k2-prompt"></p>
      <div class="k2-options" id="k2-options"></div>
    </div>
  </div>

  <div id="view-result" style="display:none;">
    <div class="k2-card">
      <div class="k2-result-score" id="k2-score"></div>
      <div class="k2-result-label" id="k2-score-label"></div>
      <div id="k2-review"></div>
    </div>
    <button type="button" class="k2-btn" id="btn-restart">もういちど</button>
  </div>
</div>

<script src="kanji-data.js"></script>
<script src="kanji-generator.js"></script>
<script src="grammar-generators.js"></script>
<script src="../../hub/supabase.js"></script>
<script src="../../hub/config.js"></script>
<script src="../../hub/hub-common.js"></script>
<script src="kokugo2-report.js"></script>
<script>
(async function () {
  const cfg = window.GAKUENZA_CONFIG;
  const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
  const H = window.HubCommon;

  const params = new URLSearchParams(window.location.search);
  const classId = params.get('class_id') || null;

  let ctx = { schoolId: null, classId, moduleId: null, userId: null };
  let session = null;
  try {
    session = await H.requireSession(sb);
    ctx.userId = session.user.id;
    H.mountModuleAccount(sb, ctx.userId);
    // Resolve school/class via enrollments -> classes (rules 2 & 3), the
    // established pattern every other module uses — deliberately NOT
    // profiles.home_school_id.
    const { data: enr } = await sb
      .from('enrollments').select('class_id, classes ( id, school_id )')
      .eq('user_id', session.user.id).eq('role', 'student').limit(1);
    if (enr && enr.length && enr[0].classes) {
      ctx.classId = ctx.classId || enr[0].class_id;
      ctx.schoolId = enr[0].classes.school_id;
    }
    const { data: mod } = await sb.from('modules').select('id').eq('key', 'kokugo2').maybeSingle();
    ctx.moduleId = mod?.id || null;
  } catch (e) {
    // If session/reporting context can't be resolved, the quiz itself still
    // works — reporting is attempted best-effort at the end and silently
    // skipped on failure, matching every other module's convention.
  }

  // Unit-scoped pacing (focus_units): foreground this week's units without
  // hiding the rest. kokugo2's unit keys are the literal 'kanji' plus each
  // GRAMMAR_UNITS key (see hub/module-units.js). Fails soft.
  const focusUnits = new Set();
  try {
    if (ctx.moduleId && ctx.userId) {
      const { data: enrAll } = await sb.from('enrollments').select('class_id').eq('user_id', ctx.userId);
      const classIds = (enrAll || []).map(r => r.class_id);
      if (classIds.length) {
        const { data: cms } = await sb.from('class_modules')
          .select('focus_units, class_id').eq('module_id', ctx.moduleId).in('class_id', classIds);
        let anyAll = false, hasRow = false;
        (cms || []).forEach(row => {
          hasRow = true;
          if (row.focus_units == null) anyAll = true;
          else if (Array.isArray(row.focus_units)) row.focus_units.forEach(k => focusUnits.add(k));
        });
        if (!hasRow || anyAll) focusUnits.clear();
      }
    }
  } catch (e) { focusUnits.clear(); }

  function markFocus(btn) {
    if (!btn || btn.querySelector('.k2-focus-badge')) return;
    btn.classList.add('k2-focus');
    const h = btn.querySelector('h3');
    if (h) h.insertAdjacentHTML('beforeend', ' <span class="k2-focus-badge">今週</span>');
  }
  (function applyModeFocus() {
    const grammarKeys = Object.keys(window.GRAMMAR_UNITS || {});
    if (focusUnits.has('kanji')) markFocus(document.getElementById('btn-mode-kanji'));
    if (grammarKeys.some(k => focusUnits.has(k))) markFocus(document.getElementById('btn-mode-grammar'));
  })();

  const viewSelect = document.getElementById('view-select');
  const viewUnitSelect = document.getElementById('view-unit-select');
  const viewQuiz = document.getElementById('view-quiz');
  const viewResult = document.getElementById('view-result');
  function showView(v) {
    [viewSelect, viewUnitSelect, viewQuiz, viewResult].forEach(el => el.style.display = 'none');
    v.style.display = 'block';
  }

  let currentMode = null;
  let currentUnitKey = null;
  let questions = [];
  let qIndex = 0;
  let results = [];

  document.getElementById('btn-mode-kanji').addEventListener('click', () => {
    currentMode = 'kanji';
    currentUnitKey = null;
    questions = generateKanjiQuiz(KANJI2, 10);
    startQuiz();
  });

  document.getElementById('btn-mode-grammar').addEventListener('click', () => {
    currentMode = 'grammar';
    const unitList = document.getElementById('unit-list');
    const units = window.GRAMMAR_UNITS || {};
    const keys = Object.keys(units);
    unitList.innerHTML = keys.map(key => {
      const u = units[key];
      const foc = focusUnits.has(key);
      return `<button type="button" class="k2-mode-btn${foc ? ' k2-focus' : ''}" style="width:100%;margin-bottom:10px;" data-gunit="${key}">
        <h3>${u.title}${foc ? ' <span class="k2-focus-badge">今週</span>' : ''}</h3>
        <p>${u.desc}</p>
      </button>`;
    }).join('');
    unitList.querySelectorAll('[data-gunit]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentUnitKey = btn.dataset.gunit;
        questions = window.generateGrammarQuiz(currentUnitKey, 10);
        startQuiz();
      });
    });
    showView(viewUnitSelect);
  });

  document.getElementById('btn-back-1').addEventListener('click', () => showView(viewSelect));

  function startQuiz() {
    qIndex = 0;
    results = [];
    showView(viewQuiz);
    renderQuestion();
  }

  function renderQuestion() {
    const q = questions[qIndex];
    document.getElementById('k2-progress').textContent = `${qIndex + 1} / ${questions.length}`;
    document.getElementById('k2-cat').textContent = q.category;
    document.getElementById('k2-prompt').textContent = q.prompt;
    const optsEl = document.getElementById('k2-options');
    optsEl.innerHTML = '';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'k2-opt';
      btn.textContent = opt;
      btn.addEventListener('click', () => selectAnswer(opt));
      optsEl.appendChild(btn);
    });
  }

  function selectAnswer(selected) {
    const q = questions[qIndex];
    const correct = selected === q.correctAnswer;
    results.push({
      itemRef: q.itemRef, category: q.category, prompt: q.prompt,
      correct, selectedAnswer: selected, correctAnswer: q.correctAnswer,
    });

    document.querySelectorAll('.k2-opt').forEach(btn => {
      btn.disabled = true;
      if (btn.textContent === q.correctAnswer) btn.classList.add('correct');
      else if (btn.textContent === selected) btn.classList.add('wrong');
    });

    setTimeout(() => {
      qIndex++;
      if (qIndex < questions.length) renderQuestion();
      else finishQuiz();
    }, 700);
  }

  async function finishQuiz() {
    const score = results.filter(r => r.correct).length;
    document.getElementById('k2-score').textContent = `${score} / ${results.length}`;
    document.getElementById('k2-score-label').textContent = '正解数';

    const wrong = results.filter(r => !r.correct);
    const reviewEl = document.getElementById('k2-review');
    if (wrong.length) {
      reviewEl.innerHTML = wrong.map(r => `
        <div class="k2-review-item">
          <div class="prompt">${r.prompt}</div>
          <div>あなたの答え：<span class="yours">${r.selectedAnswer}</span> 　正かい：<span class="correct-ans">${r.correctAnswer}</span></div>
        </div>`).join('');
    } else {
      reviewEl.innerHTML = '<p style="text-align:center;color:var(--ink-soft);font-size:0.85rem;">ぜんもん 正かいでした！</p>';
    }
    showView(viewResult);

    if (ctx.userId && ctx.moduleId) {
      try {
        await window.Kokugo2Report.reportKokugo2(sb, ctx, { mode: currentMode, unitKey: currentUnitKey, results });
      } catch (e) {
        // best-effort — never block the result screen on a reporting failure
      }
    }
  }

  document.getElementById('btn-restart').addEventListener('click', () => showView(viewSelect));
})();
</script>
</body>
</html>
