<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1C2530">
  <title>New Horizons 6 — がくえん座</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="eg-topbar">
  <a class="eg-back" href="../../hub/index.html">← ホームへ</a>
  <span class="eg-topbar-label">New Horizons 6</span>
  <div class="eg-topbar-right" id="module-account-mount"></div>
</header>

<main class="eg-shell">
  <!-- ══ MENU ══ -->
  <section class="screen active" id="screen-menu">
    <div class="eg-menu-head">
      <div class="eg-eyebrow">PRACTICE</div>
      <h1 class="eg-h1">New Horizons 6　メニュー</h1>
      <div class="eg-rule"></div>
    </div>
    <p class="eg-note">ユニットを選んで練習しよう！文法・応答・書きの3つの練習ができます。</p>

    <div class="eg-menu-grid">
      <div class="eg-card eg-unit-panel">
        <div class="eg-panel-head">
          <h2 class="eg-h2">ユニットをえらぶ</h2>
          <span class="eg-panel-sub" id="unit-count-label"></span>
        </div>
        <div class="eg-rule eg-rule--sm"></div>
        <div class="eg-unit-list" id="unit-grid"></div>
      </div>

      <div class="eg-menu-side">
        <div class="eg-card eg-stats" id="menu-stats" hidden>
          <h2 class="eg-h2 eg-h2--sm">あなたの成績</h2>
          <div class="eg-stats-row">
            <div class="eg-stat">
              <div class="eg-stat-num" id="stat-accuracy">–</div>
              <div class="eg-stat-label">正答率</div>
            </div>
            <div class="eg-stat eg-stat--div">
              <div class="eg-stat-num eg-stat-num--ink" id="stat-streak">–</div>
              <div class="eg-stat-label">連続日数</div>
            </div>
          </div>
        </div>

        <a class="eg-card eg-vocab-link" id="unit-vocab-link"
           href="https://hakuicity.github.io/TangoApp/" target="_blank" rel="noopener">
          <div class="eg-vocab-text">
            <h2 class="eg-h2 eg-h2--sm">単語練習</h2>
            <p>NH 絵辞典アプリへ</p>
          </div>
          <span class="eg-vocab-arrow">↗</span>
        </a>
      </div>
    </div>
  </section>

  <!-- ══ UNIT / MODE ══ -->
  <section class="screen" id="screen-unit">
    <button class="eg-btn-ghost" id="back-to-menu" type="button">← Unit一覧</button>
    <div class="eg-mode-head">
      <span class="eg-mode-emoji" id="unit-emoji">👋</span>
      <div>
        <div class="eg-eyebrow" id="unit-num" style="color:var(--moss-deep)">UNIT 1</div>
        <h1 class="eg-h1 eg-h1--sm" id="unit-title">This is me!</h1>
        <p class="eg-mode-head-ja" id="unit-ja"></p>
      </div>
    </div>
    <div class="eg-mode-grid">
      <button class="eg-mode-card" id="mode-grammar" type="button" style="border-top-color:var(--moss)">
        <span class="eg-mode-emoji-lg">📝</span>
        <span class="eg-mode-label">文法練習</span>
        <span class="eg-mode-desc">文を完成させよう</span>
      </button>
      <button class="eg-mode-card" id="mode-response" type="button" style="border-top-color:var(--gold)">
        <span class="eg-mode-emoji-lg">💬</span>
        <span class="eg-mode-label">応答練習</span>
        <span class="eg-mode-desc">質問に正しく答えよう</span>
      </button>
      <button class="eg-mode-card" id="mode-writing" type="button" style="border-top-color:var(--clay)">
        <span class="eg-mode-emoji-lg">✏️</span>
        <span class="eg-mode-label">書き練習</span>
        <span class="eg-mode-desc">文字・単語・文を書こう</span>
      </button>
    </div>
  </section>

  <!-- ══ QUIZ (grammar / response) ══ -->
  <section class="screen" id="screen-quiz">
    <div class="eg-quiz-layout">
      <div class="eg-quiz-main">
        <div class="eg-quiz-top">
          <button class="eg-btn-ghost" id="quiz-back" type="button">← モードへ</button>
          <span class="eg-quiz-score" id="quiz-score-disp">⭐ 0</span>
        </div>
        <div class="eg-progress-track"><div class="eg-progress-fill" id="quiz-progress-fill"></div></div>
        <div class="eg-quiz-counter" id="quiz-progress-text"></div>

        <div class="eg-q-card">
          <span class="eg-q-badge" id="question-label"></span>
          <p class="eg-q-prompt" id="question-prompt"></p>
          <p class="eg-q-hint" id="question-hint"></p>
        </div>

        <div class="eg-choices" id="choices-grid"></div>

        <div class="eg-feedback-row hidden" id="feedback-row">
          <span class="eg-feedback-text" id="feedback-text"></span>
          <button class="eg-btn-next" id="next-btn" type="button">次へ →</button>
        </div>
      </div>

      <aside class="eg-tracker" id="tracker-panel">
        <div class="eg-tracker-head">進捗</div>
        <div class="eg-tracker-grid" id="tracker-grid"></div>
      </aside>
    </div>
  </section>

  <!-- ══ WRITING (rich tracing canvas — preserved) ══ -->
  <section class="screen" id="screen-writing">
    <div class="eg-quiz-main eg-write-main">
      <div class="eg-quiz-top">
        <button class="eg-btn-ghost" id="write-back" type="button">← モードへ</button>
        <button class="eg-btn-ghost" id="write-mode-btn" type="button">🙈 コピーモード</button>
      </div>
      <div class="eg-progress-track"><div class="eg-progress-fill eg-progress-fill--gold" id="write-progress-fill"></div></div>
      <div class="eg-quiz-counter" id="write-progress-text">1 / 8</div>

      <div class="eg-write-inst" id="write-instruction"></div>
      <div class="eg-write-tabs" id="write-tabs"></div>

      <div class="canvas-wrap">
        <div class="guide-overlay" id="guide-overlay"></div>
        <canvas id="write-canvas" class="write-canvas"></canvas>
      </div>

      <div class="eg-write-controls">
        <button class="eg-write-btn" id="write-undo-btn" type="button">↩ 戻す</button>
        <button class="eg-write-btn" id="write-clear-btn" type="button">🗑 消す</button>
        <button class="eg-write-btn" id="write-prev-btn" type="button" disabled>← まえ</button>
        <button class="eg-write-btn eg-write-btn--next" id="write-next-btn" type="button">つぎ →</button>
      </div>
    </div>
  </section>

  <!-- ══ REVIEW ══ -->
  <section class="screen" id="screen-results">
    <div class="eg-review">
      <div class="eg-ring" id="result-ring">
        <div class="eg-ring-inner">
          <div class="eg-ring-pct" id="results-score">0%</div>
          <div class="eg-ring-label">せいかい率</div>
        </div>
      </div>
      <h2 class="eg-h2 eg-review-msg" id="results-msg"></h2>
      <p class="eg-review-score" id="results-scoretext"></p>
      <div class="eg-sync" id="results-sync"></div>
      <div class="eg-wrong" id="results-wrong"></div>
      <button class="eg-btn-primary eg-btn-block" id="results-menu" type="button">メニューに戻る</button>
      <div class="eg-review-secondary">
        <button class="eg-btn-ghost" id="results-retry" type="button">もう一度</button>
        <button class="eg-btn-ghost" id="results-unit" type="button">ユニットへ</button>
      </div>
    </div>
  </section>
</main>

<script src="data.js"></script>
<script src="writing.js"></script>
<script src="tts.js"></script>
<script src="app.js"></script>
<script src="../../hub/supabase.js"></script>
<script src="../../hub/config.js"></script>
<script src="../../hub/hub-common.js"></script>
<script src="eigo6-report.js"></script>
</body>
</html>
