<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="がくえん座の導入の流れ — 準備は、3つのステップだけ。">
<title>導入の流れ — がくえん座</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="marketing.css">
</head>
<body>

<header class="mkt-header">
  <div class="mkt-header-inner">
    <a href="index.html" class="mkt-brand">がくえん座</a>
    <nav class="mkt-nav">
      <a href="features.html" class="mkt-nav-link">特長</a>
      <a href="modules.html" class="mkt-nav-link">モジュール</a>
      <a href="onboarding.html" class="mkt-nav-link active">導入の流れ</a>
      <a href="hub/login.html" class="mkt-nav-link">ログイン</a>
      <button class="mkt-btn mkt-btn-accent mkt-btn-sm" type="button" disabled title="準備中">資料請求</button>
    </nav>
  </div>
</header>

<section class="mkt-hero">
  <div class="mkt-hero-inner mkt-hero-sub">
    <div class="mkt-eyebrow">導入の流れ</div>
    <h1 style="font-size:2rem;">準備は、3つのステップだけ</h1>
  </div>
</section>

<section class="mkt-wrap" style="padding-top:56px;padding-bottom:80px;">
  <div style="display:flex;flex-direction:column;gap:0;">
    <div style="display:grid;grid-template-columns:64px 1fr;gap:20px;padding-bottom:36px;">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div style="width:44px;height:44px;border-radius:50%;background:var(--moss-tint);color:var(--moss-deep);font-family:var(--font-display);font-weight:700;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex:0 0 auto;">1</div>
        <div style="width:1.5px;flex:1;background:var(--border);margin-top:6px;"></div>
      </div>
      <div>
        <h3 style="font-size:1.05rem;margin:0 0 8px;">学校とクラスをつくる</h3>
        <p style="font-size:0.86rem;line-height:1.8;color:var(--ink-soft);">管理画面から学校を登録し、クラスと先生を追加します。名簿はその場で入力するだけです。</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:64px 1fr;gap:20px;padding-bottom:36px;">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div style="width:44px;height:44px;border-radius:50%;background:var(--moss-tint);color:var(--moss-deep);font-family:var(--font-display);font-weight:700;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex:0 0 auto;">2</div>
        <div style="width:1.5px;flex:1;background:var(--border);margin-top:6px;"></div>
      </div>
      <div>
        <h3 style="font-size:1.05rem;margin:0 0 8px;">生徒に合言葉をわたす</h3>
        <p style="font-size:0.86rem;line-height:1.8;color:var(--ink-soft);">生徒を追加すると、初回ログイン用のパスワードが一度だけ表示されます。紙にひかえて手渡すだけ。メールアドレスは要りません。</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:64px 1fr;gap:20px;">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div style="width:44px;height:44px;border-radius:50%;background:var(--moss-tint);color:var(--moss-deep);font-family:var(--font-display);font-weight:700;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex:0 0 auto;">3</div>
      </div>
      <div>
        <h3 style="font-size:1.05rem;margin:0 0 8px;">割り当てて、見守る</h3>
        <p style="font-size:0.86rem;line-height:1.8;color:var(--ink-soft);">モジュールをクラスに割り当てれば準備完了。あとは子どもたちの進み具合を、静かに見守れます。</p>
      </div>
    </div>
  </div>
</section>

<footer class="mkt-footer">
  <div class="mkt-footer-inner">
    <span class="mkt-footer-mark">継続は力なり</span>
  </div>
</footer>

</body>
</html>
